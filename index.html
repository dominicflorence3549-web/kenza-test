<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Кензан — вторая жизнь цветам, цены ниже рыночных</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&family=Manrope:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&family=Manrope:wght@400;500;600;700;800&display=swap"></noscript>
<style>
:root{--pine:#14352B;--pine2:#1D4A3C;--ivory:#FBF7EF;--paper:#FFF;--ink:#22302B;--muted:#7A8580;--rasp:#C2476B;--gold:#C8A24B;--line:#E5DFD2;--bg:#EFEBE0;--ok:#2E7D52;--warn:#A36B12}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);font-family:'Manrope',system-ui,sans-serif;color:var(--ink);display:flex;flex-direction:column;max-width:520px;margin:0 auto;height:100dvh;overflow:hidden}
button{font-family:'Manrope'}
.hdr{background:var(--pine);color:var(--ivory);padding:12px 16px 10px;flex:none}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{font-family:'Prata',serif;font-size:21px}
.brand i{font-style:normal;color:#E9B6C6}
.city{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:99px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;max-width:55%}
.city span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:11.5px;color:rgba(251,247,239,.65);margin-top:6px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:11px 14px 3px;scrollbar-width:none;flex:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:7px 13px;border-radius:99px;background:var(--paper);border:1px solid var(--line);font-size:12.5px;font-weight:700;cursor:pointer}
.chip.on{background:var(--pine);color:var(--ivory);border-color:var(--pine)}
.scroll{flex:1;overflow-y:auto;padding:10px 14px 96px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--paper);border-radius:18px;overflow:hidden;border:1px solid var(--line);cursor:pointer;position:relative}
.card:active{transform:scale(.98)}
.ph{position:relative;height:150px;background:#E7E1D2}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.tag{position:absolute;top:8px;left:8px;background:rgba(20,53,43,.88);color:var(--ivory);font-size:9.5px;font-weight:800;border-radius:6px;padding:4px 7px;z-index:2}
.tag.gold{background:rgba(146,112,33,.92)}
.taglist{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;align-items:flex-start;max-width:64%;z-index:2}
.taglist .tag{position:static;max-width:100%;line-height:1.25}
.petals{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.93);border-radius:99px;padding:4px 8px;display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;color:var(--pine);box-shadow:0 1px 4px rgba(0,0,0,.12);z-index:2}
.pdot{display:flex;gap:2px}
.pdot s{width:6px;height:6px;border-radius:50% 50% 50% 0;background:var(--rasp);transform:rotate(-45deg);display:block}
.pdot s.off{background:#E4DCCF}
.cbody{padding:10px 12px 12px}
.cprice{font-family:'Prata',serif;font-size:17px;color:var(--pine)}
.cprice em{font-style:normal;font-size:11.5px;color:var(--muted);text-decoration:line-through;font-family:'Manrope';font-weight:600;margin-left:6px}
.cmeta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.crow{display:flex;align-items:center;justify-content:space-between;margin-top:7px;font-size:10.5px;font-weight:800}
.bn{color:var(--rasp)}.bn.fix{color:var(--ok)}
.nav{flex:none;background:var(--pine);display:flex;padding:8px 8px calc(10px + env(safe-area-inset-bottom));position:relative;z-index:30}
.nv{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(251,247,239,.55);font-size:9.5px;font-weight:800;cursor:pointer;padding:5px 0}
.nv svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nv.on{color:var(--ivory)}
.nv .pk{background:var(--rasp);color:#fff;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-22px;box-shadow:0 4px 12px rgba(194,71,107,.45);border:3px solid var(--pine)}
.nv .pk svg{width:20px;height:20px;stroke-width:2.2}
.sheet{position:fixed;inset:0;background:rgba(15,28,23,.55);z-index:40;display:none;align-items:flex-end;justify-content:center}
.sheet.open{display:flex}
.sbody{background:var(--ivory);width:100%;max-width:520px;max-height:92dvh;border-radius:24px 24px 0 0;overflow-y:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.gal{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;height:240px;background:#E7E1D2}
.gal img{width:100%;flex:none;object-fit:cover;scroll-snap-align:center}
.xbtn{position:absolute;top:12px;left:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.93);border:none;font-size:16px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);z-index:3}
.sin{padding:16px 18px 28px}
.sprice{font-family:'Prata',serif;font-size:28px;color:var(--pine)}
.sprice em{font-style:normal;font-size:13.5px;color:var(--muted);text-decoration:line-through;font-family:'Manrope';font-weight:600;margin-left:8px}
.save{display:inline-block;background:#EAF3EC;color:var(--ok);font-size:11.5px;font-weight:800;border-radius:8px;padding:4px 9px;margin-top:6px}
.kv{margin-top:14px;border-top:1px solid var(--line);padding-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;font-size:13px}
.kv b{display:block;font-size:10.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.seller{margin-top:14px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;align-items:center;gap:11px}
.ava{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#9DB89F,#1D4A3C);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex:none}
.seller .nm{font-weight:800;font-size:13.5px}
.seller .rt{font-size:11.5px;color:var(--muted);margin-top:2px}
.seller .rt i{font-style:normal;color:var(--gold);font-weight:800}
.auc{margin-top:14px;background:var(--pine);border-radius:16px;padding:14px;color:var(--ivory)}
.auc h4{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:rgba(251,247,239,.6);display:flex;justify-content:space-between;align-items:center}
.auc h4 span{font-size:13px;letter-spacing:0;text-transform:none;font-weight:800;color:#F0C8D4}
.bidlist{margin-top:10px;display:flex;flex-direction:column;gap:7px;max-height:130px;overflow-y:auto}
.bid{display:flex;justify-content:space-between;font-size:12.5px;background:rgba(255,255,255,.07);border-radius:9px;padding:7px 10px}
.bidrow{display:flex;gap:8px;margin-top:12px}
.bidrow input{flex:1;border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:700;font-family:'Manrope';background:rgba(255,255,255,.95);color:var(--ink)}
.bidrow button{background:var(--rasp);border:none;color:#fff;font-weight:800;font-size:13.5px;border-radius:11px;padding:0 18px;cursor:pointer}
.hint{font-size:10.5px;color:rgba(251,247,239,.55);margin-top:8px;line-height:1.5}
.btn{display:block;width:100%;margin-top:14px;background:var(--rasp);border:none;color:#fff;font-weight:800;font-size:14.5px;border-radius:13px;padding:15px;cursor:pointer;text-align:center}
.btn.green{background:var(--pine)}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--muted)}
.btn:disabled{opacity:.55}
.safety{margin-top:14px;background:#FCF6E8;border:1px solid #EFE2BE;border-radius:13px;padding:12px;font-size:11.5px;line-height:1.6;color:#6B5B2E}
.safety b{display:block;margin-bottom:3px;font-size:12px}
.rep{display:block;text-align:center;margin-top:12px;font-size:11.5px;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;width:100%}
.steps{display:flex;gap:6px;margin:4px 2px 16px}
.steps i{flex:1;height:4px;border-radius:4px;background:var(--line)}
.steps i.on{background:var(--rasp)}
.fT{font-family:'Prata',serif;font-size:21px;color:var(--pine);margin-bottom:4px}
.fS{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:14px}
.upload{border:2px dashed #CFC7B4;border-radius:16px;background:var(--paper);padding:22px 16px;text-align:center;cursor:pointer}
.upload p{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.5}
.thumbs{display:flex;gap:8px;margin-top:10px}
.thumbs img{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--line);display:block}
.thumb{position:relative;flex:none}
.thumbx{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:var(--rasp);color:#fff;border:2px solid var(--ivory);font-size:14px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.codebox{margin-top:14px;background:var(--pine);color:var(--ivory);border-radius:14px;padding:14px;text-align:center}
.codebox small{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:rgba(251,247,239,.55)}
.codebox b{font-family:'Courier New',monospace;font-size:23px;letter-spacing:3px;display:block;margin-top:4px}
.codebox p{font-size:11px;color:rgba(251,247,239,.7);margin-top:7px;line-height:1.5}
.lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:15px 0 7px}
.opt{display:flex;gap:8px;flex-wrap:wrap}
.opt span{padding:9px 13px;border-radius:11px;background:var(--paper);border:1.5px solid var(--line);font-size:12.5px;font-weight:700;cursor:pointer}
.opt span.on{border-color:var(--rasp);color:var(--rasp);background:#FBF0F3}
.inp{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:14px;font-family:'Manrope';font-weight:600;background:var(--paper);color:var(--ink)}
.inp:focus{outline:none;border-color:var(--pine)}
textarea.inp{resize:none;min-height:74px}
.fee{margin-top:12px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6}
.fee b{color:var(--ok)}
.done{text-align:center;padding:36px 10px}
.done .big{font-size:52px}
.done h3{font-family:'Prata',serif;font-size:22px;color:var(--pine);margin-top:14px}
.done p{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.65}
.req{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:11px}
.req h4{font-size:14px;font-weight:800;padding-right:90px}
.req .m{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5}
.req .b{display:inline-block;margin-top:9px;background:#F3EDFB;color:#6B4FA0;font-size:11px;font-weight:800;border-radius:8px;padding:4px 9px}
.req .resp{float:right;background:var(--pine);color:var(--ivory);border:none;border-radius:9px;padding:8px 12px;font-size:11.5px;font-weight:800;cursor:pointer}
.banner{background:linear-gradient(120deg,var(--pine),var(--pine2));border-radius:16px;color:var(--ivory);padding:15px;margin-bottom:14px}
.banner h3{font-family:'Prata',serif;font-size:16.5px}
.banner p{font-size:11.5px;color:rgba(251,247,239,.7);margin-top:6px;line-height:1.55}
.pcard{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center}
.pcard h3{font-family:'Prata',serif;font-size:19px;margin-top:8px;color:var(--pine)}
.pcard .sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5}
.rrow{display:flex;gap:10px;margin-top:12px}
.rbox{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:12px;text-align:center}
.rbox b{font-family:'Prata',serif;font-size:19px;color:var(--pine);display:block}
.rbox small{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:800}
.hi{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:9px;font-size:12.5px}
.hi .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hi b{font-size:13px}
.hi small{color:var(--muted);font-size:11px;display:block;margin-top:3px;line-height:1.5}
.st{font-size:10px;font-weight:800;border-radius:7px;padding:3px 8px;flex:none}
.st.mod{background:#FCF3DD;color:var(--warn)}.st.act{background:#EAF3EC;color:var(--ok)}
.st.rej{background:#FBE9EE;color:var(--rasp)}.st.sold{background:#E9EFF8;color:#3A5E94}.st.exp{background:#EEE;color:#888}
.mini{margin-top:8px;display:flex;gap:7px;flex-wrap:wrap}
.mini button{border:1.5px solid var(--line);background:var(--paper);border-radius:9px;padding:7px 11px;font-size:11.5px;font-weight:800;cursor:pointer;color:var(--ink)}
.mini button.win{border-color:var(--ok);color:var(--ok)}
.mini button.del{color:var(--rasp);border-color:#F0CBD7}
.starrow{display:flex;gap:6px;margin-top:8px}
.starrow b{font-size:20px;color:#D8D2C0;cursor:pointer}
.starrow b.on{color:var(--gold)}
.empty{text-align:center;padding:54px 20px;color:var(--muted);font-size:13px;line-height:1.65}
.empty .e{font-size:40px;margin-bottom:10px}
.clist .hi{display:flex;gap:10px;align-items:center;cursor:pointer}
.clist img{width:46px;height:46px;border-radius:10px;object-fit:cover;background:#E7E1D2;flex:none}
.clist .dot{width:9px;height:9px;border-radius:50%;background:var(--rasp);flex:none}
.chead{padding:48px 16px 10px;border-bottom:1px solid var(--line)}
.chead b{font-size:14.5px}
.chead small{color:var(--muted);font-size:10.5px;display:block;margin-top:3px;line-height:1.45}
.cmsgs{display:flex;flex-direction:column;gap:7px;padding:14px;min-height:180px;max-height:46dvh;overflow-y:auto;background:var(--bg);-webkit-overflow-scrolling:touch}
.msg{max-width:80%;padding:9px 12px;border-radius:14px;font-size:13.5px;line-height:1.45;word-break:break-word}
.msg.me{align-self:flex-end;background:var(--pine);color:var(--ivory);border-bottom-right-radius:4px}
.msg.them{align-self:flex-start;background:var(--paper);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg a{color:inherit;text-decoration:underline}
.msg time{display:block;font-size:9.5px;opacity:.55;margin-top:3px;text-align:right}
.msg .msgimg{display:block;max-width:200px;max-height:240px;border-radius:10px;margin-bottom:5px;cursor:pointer;background:#E7E1D2}
.crow2 .attach{flex:none;background:var(--paper);border:1.5px solid var(--line);color:var(--pine);border-radius:12px;padding:0 12px;font-size:17px;cursor:pointer}
.cgive{position:absolute;top:12px;right:12px;z-index:4;border:none;background:var(--pine);color:var(--ivory);border-radius:99px;padding:7px 12px;font-size:11px;font-weight:800;cursor:pointer}
.navbadge{display:none;position:absolute;top:0;left:calc(50% + 5px);min-width:17px;height:17px;padding:0 4px;border-radius:99px;background:var(--rasp);color:#fff;font-size:10px;font-weight:800;line-height:17px;text-align:center;box-shadow:0 0 0 2px var(--pine);pointer-events:none}
.crow2{display:flex;gap:8px;padding:10px 14px 14px}
.crow2 input{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:14px;font-family:'Manrope';background:var(--paper);color:var(--ink)}
.crow2 button{background:var(--rasp);color:#fff;border:none;border-radius:12px;padding:0 18px;font-weight:800;font-size:15px;cursor:pointer}
.sbody.chatmode{position:fixed;left:50%;transform:translateX(-50%);top:0;width:100%;max-width:520px;height:100dvh;max-height:none;border-radius:0;display:flex;flex-direction:column;animation:chatin .22s ease}
.sbody.chatmode .chead{flex:none}
.sbody.chatmode .cmsgs{flex:1;max-height:none;min-height:0}
.sbody.chatmode .crow2{flex:none}
.sbody.chatmode>.rep{flex:none}
@keyframes chatin{from{opacity:.4;transform:translateX(-50%) translateY(28px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#splash{position:fixed;inset:0;background:var(--pine);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#splash .sbrand{font-family:'Prata',serif;font-size:34px;color:var(--ivory)}
#splash .sbrand i{font-style:normal;color:#E9B6C6}
#splash .sdots{display:flex;gap:7px}
#splash .sdots s{width:9px;height:9px;border-radius:50% 50% 50% 0;background:#E9B6C6;transform:rotate(-45deg);display:block;animation:pp 1s ease-in-out infinite}
#splash .sdots s:nth-child(2){animation-delay:.15s}
#splash .sdots s:nth-child(3){animation-delay:.3s}
@keyframes pp{0%,100%{opacity:.3;transform:rotate(-45deg) scale(.85)}50%{opacity:1;transform:rotate(-45deg) scale(1.1)}}
#splash.hide{opacity:0;pointer-events:none;transition:opacity .35s}
#reqFab{display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:calc(70px + env(safe-area-inset-bottom));width:calc(100% - 28px);max-width:492px;z-index:25;background:var(--rasp);color:#fff;border:none;border-radius:13px;padding:15px;font-weight:800;font-size:14.5px;box-shadow:0 6px 18px rgba(194,71,107,.4);cursor:pointer}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--pine);color:var(--ivory);font-size:12.5px;font-weight:700;border-radius:99px;padding:11px 18px;opacity:0;transition:.3s;z-index:90;pointer-events:none;max-width:90%;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.toast.show{opacity:1;bottom:108px}
.spin{position:fixed;inset:0;background:rgba(239,235,224,.6);z-index:80;display:none;align-items:center;justify-content:center}
.spin.show{display:flex}
.spin div{width:38px;height:38px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--rasp);animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.ob{position:fixed;inset:0;background:var(--pine);z-index:70;color:var(--ivory);display:none;flex-direction:column;justify-content:center;padding:26px;overflow-y:auto}
.ob.show{display:flex}
.ob h1{font-family:'Prata',serif;font-size:30px}
.ob h1 i{font-style:normal;color:#E9B6C6}
.ob p{font-size:13.5px;line-height:1.65;color:rgba(251,247,239,.8);margin-top:12px}
.ob .lbl{color:rgba(251,247,239,.55)}
.ob .inp{background:rgba(255,255,255,.95)}
.ck{display:flex;gap:10px;align-items:flex-start;margin-top:13px;font-size:12px;line-height:1.55;color:rgba(251,247,239,.85)}
.ck input{width:19px;height:19px;flex:none;accent-color:var(--rasp);margin-top:1px}
.ck a{color:#F0C8D4}
.legal{margin-top:16px;text-align:center;font-size:11px;color:var(--muted);line-height:1.8}
.legal a{color:var(--muted)}
</style>
</head>
<body>

<div id="splash"><div class="sbrand">Кенза<i>н</i></div><div class="sdots"><s></s><s></s><s></s></div></div>

<div class="hdr">
  <div class="hdr-top">
    <div class="brand">Кенза<i>н</i></div>
    <div class="city" onclick="openCity()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 1 1 14 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg><span id="cityLbl">Город</span></div>
  </div>
  <div class="hdr-sub" id="hsub">Вторая жизнь цветам</div>
</div>

<div class="chips" id="chips"></div>

<div class="nav">

<script>
/* ================== НАСТРОЙКА (заполните после деплоя) ================== */
const CFG = {

const tgApp = window.Telegram && window.Telegram.WebApp;
const INIT = tgApp ? tgApp.initData : "";
if (tgApp) { try { tgApp.ready(); tgApp.expand(); tgApp.setHeaderColor("#14352B"); tgApp.setBackgroundColor("#EFEBE0"); } catch(e){} }

const CITIES = ["Москва","Нальчик","Махачкала","Владикавказ"];
const CATS=[["all","Все"],["mono","Монобукеты"],["bouquet","Сборные букеты"],["basket","Цветы в корзине"]];
const CATNAME={mono:"Монобукет",bouquet:"Сборный букет",basket:"Цветы в корзине"};
const WORD_POOLS={
 base:["ПИОНЧИК","РОЗОЧКА","БУКЕТИК","ЛЕПЕСТОК","СОЛНЫШКО","ВАЙБ","БАЗА","ТОПЧИК","ОГОНЁК","ЛАМПОВО","МУРМУР","КОМПОТ",
   "РОМАШКА","ОРХИДЕЯ","ЛАВАНДА","ФРЕЗИЯ","ГЕРБЕРА","ЛИЛИЯ","НАРЦИСС","ВАСИЛЁК","КЛЕВЕР","ТЮЛЬПАНЧИК","ГВОЗДИКА","ХРИЗАНТЕМА",
   "МЯТА","КАРАМЕЛЬ","ЗЕФИР","МАРМЕЛАД","ПЛЮШКА","ПРЯНИК","КАКАО","ВАФЕЛЬКА","ПОНЧИК","ЛИМОНЧИК",
   "КОТИК","ЁЖИК","ПИНГВИН","ДЕЛЬФИН","ОБЛАЧКО","РАДУГА","ЗВЁЗДОЧКА","ЛУЧИК","ПУШИСТИК","ЛАСКА",
   "ЯГОДКА","ПЕРСИК","АБРИКОС","ВИШЕНКА","МАЛИНКА","КЛУБНИКА","ЧЕРЕШНЯ","НЕКТАРИН","УЮТИК","ТЕПЛИНКА",
   "КРАШ","ФЛЕКС","ВАЙБЕЦ","ИМБА","СИХСЕВЕН","ТОКСИК","КРИНЖ","ТЮБИК","ФЛОП","ВЕНИК","ДУШНИЛА","РЕДФЛАГ","БЫВШИЙ","ИЗВИНИ","РОФЛ","ЧИЛЛ","ЖИЗА","ХАЙП","СКУФ","СИГМА","БАЗИРОВАНО","ПУШКА","АГОНЬ","ТРЕНД","ДРИП","ГОЙДА","МЕМАС","ЛАЙК","ХАЛК","СЛЭЙ"],
 ny:["МАНДАРИНКА","СНЕЖОК","ОЛИВЬЕ","ЁЛОЧКА","ХЛОПУШКА","ГИРЛЯНДА","СНЕГОВИК","МИШУРА","КОНФЕТТИ","КУРАНТЫ","ИМБИРЬ","ЗВЕЗДА"],
 feb14:["КРАШ","ВАЛЕНТИНКА","СЕРДЕЧКО","АМУР","ЛЮБОВЬ","РОМАНТИК","ОБНИМАШКА","ВЛЮБЛЁННОСТЬ"],
 mar8:["МИМОЗА","ВЕСНА","ТЮЛЬПАН","ПОДСНЕЖНИК","КАПЕЛЬ","ПЕРВОЦВЕТ","ПРОТАЛИНКА","КРОКУС"],
 sep1:["ПЕРВОКЛАШКА","ЗВОНОК","ОСЕНЬ","ПЕНАЛ","ПЯТЁРКА","ГЛОБУС","ТЕТРАДКА"],
 autumn:["ЛИСТОПАД","ТЫКОВКА","УЮТ","ПЛЕД","КАШТАН","РЯБИНКА","ЖЁЛУДЬ","ТУМАНЧИК"]
};
function seasonWords(){const d=new Date(),m=d.getMonth()+1,day=d.getDate();
 if((m===12&&day>=20)||(m===1&&day<=8))return WORD_POOLS.ny;
 if(m===2&&day>=10&&day<=14)return WORD_POOLS.feb14;
 if(m===3&&day<=8)return WORD_POOLS.mar8;
 if((m===8&&day>=25)||(m===9&&day<=5))return WORD_POOLS.sep1;
 if(m>=9&&m<=11)return WORD_POOLS.base.concat(WORD_POOLS.autumn);
 return WORD_POOLS.base;}
function genCode(){const w=seasonWords();return w[Math.floor(Math.random()*w.length)]+" "+(10+Math.floor(Math.random()*90));}
function rerollCode(){sd.code=genCode();renderSell();}

let U=null, tab="feed", cat="all", scopeAll=false;
let feedCache=[], reqCache=[], curLot=null, tick=null, userReturn=null;
let sellStep=1, sd={photos:[],size:"",fresh:"",fmt:"auction",code:genCode()};

const $=q=>document.querySelector(q);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const rub=n=>Number(n||0).toLocaleString("ru-RU")+" ₽";
function photosOf(l){let p=l&&l.photos;if(typeof p==="string"){try{p=JSON.parse(p)}catch(e){p=[]}}return Array.isArray(p)?p:[]}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove("show"),2600)}
function spin(on){$("#spin").classList.toggle("show",!!on)}
function ask2(msg,cb){if(tgApp&&tgApp.showConfirm){try{tgApp.showConfirm(msg,function(okk){if(okk)cb()});return}catch(e){}}if(window.confirm(msg))cb()}

async function api(action,payload={}){
  const r=await fetch(CFG.API,{method:"POST",headers:{"content-type":"application/json","x-init-data":INIT},body:JSON.stringify({action,...payload})});
  const j=await r.json().catch(()=>({ok:false,error:"Нет связи"}));
  if(!j.ok)throw new Error(j.error||"Ошибка");
  return j.data;
}

/* ================== старт и онбординг ================== */
function hideSplash(){const s=$("#splash");if(s&&!s._h){s._h=1;s.classList.add("hide");setTimeout(()=>{try{s.remove()}catch(_){}}, 400);}}
async function boot(){
  if(!INIT){
    hideSplash();
    $("#ob").classList.add("show");
    $("#ob").innerHTML=`<h1>Кенза<i>н</i></h1><p>Это мини-приложение Telegram. Откройте его через бота — кнопкой меню или командой /start.</p>`;
    return;
  }
  spin(1);
  try{
    const d=await api("bootstrap");
    U=d.user;
    if(U.needs_consent||!U.city)showOnboarding();else start();
  }catch(e){hideSplash();toast(e.message)}
  spin(0);
}
function showOnboarding(){
  hideSplash();
  const ob=$("#ob");ob.classList.add("show");
  ob.innerHTML=`
   <h1>Кенза<i>н</i></h1>
   <p>Площадка, где можно купить и продать цветы, которые остались после мероприятий, переездов и других ситуаций, когда букет больше не нужен, — а также передать цветы в пользу благотворительности. Цены — ниже рыночных. Покупайте, продавайте, оставляйте запросы. Бесплатно.</p>
   <p style="font-size:12px;color:rgba(251,247,239,.6);line-height:1.5;margin-top:-4px">Мы запускаемся постепенно и сейчас работаем в нескольких городах. Если вашего города в списке пока нет — отметьте это, и мы откроем его при достаточном спросе.</p>
   <div class="lbl">Ваш город</div>
   <select class="inp" id="obCity" style="appearance:none;-webkit-appearance:none">
     <option value="" ${!U.city?"selected":""} disabled>Выберите город…</option>
     ${CITIES.map(c=>`<option value="${c}" ${U.city===c?"selected":""}>${c}</option>`).join("")}
   </select>
   <button class="btn ghost" style="margin-top:8px" onclick="askCity()">Моего города нет в списке</button>
   <div class="lbl">Ваше имя в чатах · обязательно</div>
   <input class="inp" id="obName" maxlength="40" placeholder="Как вас будут видеть собеседники" value="${esc(U.display_name||U.first_name||"")}">
   <div style="font-size:11.5px;color:rgba(251,247,239,.55);margin-top:4px">Логин Telegram остаётся скрытым — поделиться им можно прямо в чате.</div>
   <label class="ck"><input type="checkbox" id="ck1"><span>Принимаю <a href="${CFG.OFFER_URL}" target="_blank">Пользовательское соглашение</a> и ознакомился(ась) с <a href="${CFG.PRIVACY_URL}" target="_blank">Политикой конфиденциальности</a></span></label>
   <label class="ck"><input type="checkbox" id="ck2"><span>Даю <a href="${CFG.CONSENT_URL}" target="_blank">согласие на обработку персональных данных</a></span></label>
   <button class="btn" onclick="finishOb()">Начать</button>`;
}
async function finishOb(){
  const city=$("#obCity").value.trim();
  if(!city)return toast("Укажите город");
  const name=($("#obName").value||"").trim();
  if(name.length<2)return toast("Введите ваше имя — его увидят собеседники в чатах");
  if(!$("#ck1").checked||!$("#ck2").checked)return toast("Отметьте оба пункта согласия");
  spin(1);
  try{
    const d=await api("bootstrap",{accept_offer:true,accept_consent:true,city,display_name:name});
    U=d.user;$("#ob").classList.remove("show");start();
  }catch(e){toast(e.message)}
  spin(0);
}
function forceName(){
  const ob=$("#ob");ob.classList.add("show");
  ob.innerHTML=`<h1>Кенза<i>н</i></h1>
   <p>Как вас будут видеть собеседники в чатах? Имя обязательно — ваш логин Telegram остаётся скрытым.</p>
   <div class="lbl">Ваше имя</div>
   <input class="inp" id="fnIn" maxlength="40" placeholder="Например: Анна" value="${esc(U.display_name||U.first_name||"")}">
   <button class="btn" onclick="saveForceName()">Продолжить</button>`;
  const i=$("#fnIn");if(i)setTimeout(()=>i.focus(),200);
}
async function saveForceName(){
  const v=($("#fnIn").value||"").trim();
  if(v.length<2)return toast("Введите имя — минимум 2 символа");
  spin(1);
  try{ await api("set_name",{name:v}); U.display_name=v; $("#ob").classList.remove("show"); start(); }
  catch(e){toast(e.message)}
  spin(0);
}
function start(){
  hideSplash();
  if(!(U.display_name&&String(U.display_name).trim())){return forceName();}
  $("#cityLbl").textContent=scopeAll?"Вся Россия":U.city;
  renderChips();go("feed");
  refreshUnread();
  if(!window._unbTimer)window._unbTimer=setInterval(refreshUnread,20000);
  const sp=(tgApp&&tgApp.initDataUnsafe&&tgApp.initDataUnsafe.start_param)||"";
  if(sp.indexOf("lot_")===0)setTimeout(()=>openLot(sp.slice(4)),300);
}

async function refreshUnread(){
  try{ const d=await api("unread"); const b=$("#unb"); if(!b)return;
    if(d&&d.n>0){ b.textContent=d.n>99?"99+":d.n; b.style.display="inline-block"; } else { b.style.display="none"; }
  }catch(e){}
}
/* ================== навигация ================== */
function go(t){tab=t;document.querySelectorAll(".nv").forEach(n=>n.classList.toggle("on",n.dataset.t===t));
 $("#chips").style.display=t==="feed"?"flex":"none";const _f=$("#reqFab");if(_f)_f.style.display=t==="req"?"block":"none";
 $("#hsub").textContent=({feed:"Вторая жизнь цветам",req:"Покупатели ищут букеты прямо сейчас",sell:"Минута на лот — и букет работает на вас",chats:"Анонимная переписка — Telegram не раскрывается",prof:"Рейтинг — главная валюта на площадке"})[t];
 ({feed:renderFeed,req:renderReqs,sell:renderSell,chats:renderChats,prof:renderProf})[t]();
}
function renderChips(){$("#chips").innerHTML=CATS.map(c=>`<div class="chip ${c[0]===cat?"on":""}" onclick="cat='${c[0]}';renderChips();renderFeed()">${c[1]}</div>`).join("")}

/* ================== лента ================== */
function petals(ms){const left=Math.max(0,Math.ceil(ms/(120*60e3)*5));let h='<span class="pdot">';for(let i=0;i<5;i++)h+=`<s class="${i<left?"":"off"}"></s>`;return h+"</span>"}
function mmss(ms){if(ms<=0)return"финал";const s=Math.floor(ms/1000),m=Math.floor(s/60);return(m>=60?Math.floor(m/60)+"ч ":"")+(m%60)+":"+String(s%60).padStart(2,"0")}

async function renderFeed(){
  $("#view").innerHTML=`<div class="empty">Загружаю букеты…</div>`;
  try{
    const d=await api("feed",{city:scopeAll?"all":U.city,category:cat});
    feedCache=d.lots;
  }catch(e){return $("#view").innerHTML=`<div class="empty">${esc(e.message)}</div>`}
  if(!feedCache.length){
    $("#view").innerHTML=`<div class="empty"><div class="e">🌷</div>Здесь пока пусто.<br>Станьте первым продавцом в своём городе — нажмите «Разместить».<br><br>Или загляните в «Запросы» и расскажите, какой букет ищете.</div>`;return;
  }
  $("#view").innerHTML=`<div class="grid">${feedCache.map(l=>{
    const price=l.sale_type==="fixed"?l.fixed_price:l.current_price;
    const ends=l.auction_ends_at?Date.parse(l.auction_ends_at)-Date.now():0;
    return `<div class="card" onclick="openLot('${l.id}')">
      <div class="ph"><img src="${esc(photosOf(l)[0]||"")}" loading="lazy" alt="" onerror="this.style.display='none'">
        <div class="taglist">
        ${l.charity_pct?'<div class="tag" style="background:rgba(146,112,33,.92)">❤ Фонд</div>':""}
        <div class="tag" style="background:${l.sale_type==="auction"?"rgba(20,53,43,.9)":"rgba(46,125,82,.95)"}">${l.sale_type==="auction"?"Аукцион":"Фикс"}</div>
        ${l.seller_verified?'<div class="tag" style="background:rgba(36,129,204,.95)"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" style="vertical-align:-1px"><path d="M20 6L9 17l-5-5"/></svg> Магазин</div>':""}
        </div>
        ${l.sale_type==="auction"?`<div class="petals" data-ends="${l.auction_ends_at||""}">${petals(ends)+mmss(ends)}</div>`:""}</div>
      <div class="cbody">
        <div class="cprice">${rub(price)}</div>
        <div class="cmeta">${esc(l.title)}<br>${esc(l.city)}${l.district?" · "+esc(l.district):""}</div>
        <div class="crow"><span class="bn ${l.sale_type==="fixed"?"fix":""}">${l.sale_type==="fixed"?"Купить сейчас":(l.bids_count||0)+" ставок · шаг "+(l.bid_step_pct||10)+"%"}</span></div>
      </div></div>`;}).join("")}</div>`;
}
clearInterval(tick);
tick=setInterval(()=>{document.querySelectorAll("[data-ends]").forEach(el=>{
  const e=el.dataset.ends;if(!e)return;const ms=Date.parse(e)-Date.now();
  el.innerHTML=petals(ms)+mmss(ms);});
  const st=$("#stick");if(st&&curLot&&curLot.auction_ends_at)st.textContent=mmss(Date.parse(curLot.auction_ends_at)-Date.now());
},1000);

/* ================== карточка лота ================== */
async function openLot(id){
  spin(1);
  let d;try{d=await api("lot",{id})}catch(e){spin(0);return toast(e.message)}
  spin(0);
  try{
  curLot=d.lot;const l=d.lot,isA=l.sale_type==="auction";
  const price=isA?l.current_price:l.fixed_price;
  const sp=l.bid_step_pct||5; const minB=Math.ceil(price*(1+sp/100)/10)*10, capB=(l.start_price||0)*2;
  $("#sbody").innerHTML=`
   <button class="xbtn" onclick="closeSheet()">✕</button>
   <div class="gal">${photosOf(l).map(p=>`<img src="${esc(p)}" alt="" onerror="this.style.display='none'">`).join("")}</div>
   <div class="sin">
    <div class="sprice">${rub(price)}</div>
    <div class="kv">
     <div><b>Букет</b>${esc(l.title)}</div><div><b>Где</b>${esc(l.city)}${l.district?", "+esc(l.district):""}</div>
     <div><b>Размер</b>${esc(l.size||"—")}</div><div><b>Состояние</b>${esc(l.freshness||"—")}${l.gifted_when?", "+esc(l.gifted_when).toLowerCase():""}</div>
     <div><b>Категория</b>${CATNAME[l.category]||"—"}</div><div><b>Формат</b>${isA?"Аукцион 2 часа":"Фиксированная цена"}</div>
    </div>
    ${l.descr?`<div style="margin-top:12px;font-size:13px;line-height:1.55;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px">${esc(l.descr)}</div>`:""}
    <div class="seller" onclick="openUser('${l.seller_id}','${l.id}')" style="cursor:pointer"><div class="ava" style="overflow:hidden">${d.seller.avatar?`<img src="${esc(d.seller.avatar)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.parentNode.textContent='${esc((d.seller.first_name||"П")[0])}'">`:esc((d.seller.first_name||"П")[0])}</div>
     <div style="flex:1;min-width:0"><div class="nm">${esc(d.seller.first_name)}</div>
     <div class="rt">${d.seller.verified?'<b style="color:#2481cc">✓ Магазин</b> · ':""}${d.seller.rating?`<i>★ ${d.seller.rating}</i> (${d.seller.rating_n})${d.seller.rating_n<3?" · мало оценок":""} · `:""}${d.seller.deals} сделок${!d.seller.rating?" · новичок":""}</div></div><span style="color:var(--muted);font-size:20px;flex:none">›</span></div>
    ${!l.is_mine?`<button class="btn green" style="margin-top:12px" onclick="openChatFromLot('${l.id}','${l.seller_id}')">💬 Написать продавцу</button>`:""}
    <button class="btn ghost" style="margin-top:10px" onclick="shareLot('${l.id}','${rub(price)}')">↗ Поделиться лотом</button>
    ${l.is_mine?`<button class="btn ghost" onclick="go('prof');closeSheet()">Это ваш лот — управление в Профиле</button>`:isA?`
    <div class="auc"><h4>Аукцион · осталось <span id="stick">${mmss(Date.parse(l.auction_ends_at)-Date.now())}</span></h4>
     <div class="bidlist">${d.bids.length?d.bids.map(b=>`<div class="bid"><span>${b.mine?"Вы":esc(b.name)}</span><b>${rub(b.amount)}</b></div>`).join(""):'<div class="bid"><span>Ставок пока нет — будьте первыми</span></div>'}</div>

async function placeBid(amount){
  const v=parseInt(amount||(($("#bi")&&$("#bi").value)||0));
  if(!v)return toast("Выберите ставку");
  const sp=curLot.bid_step_pct||10;
  const minB=Math.ceil(curLot.current_price*(1+sp/100)/10)*10;
  const capB=(curLot.start_price||0)*2;
  if(v<minB)return toast(`Минимальная ставка — ${rub(minB)} (шаг ${sp}%)`);
  if(capB&&v>capB)return toast(`Максимум — ${rub(capB)} (×2 от старта)`);
  spin(1);
  try{
    const d=await api("bid",{lot_id:curLot.id,amount:v});
    curLot.current_price=v;if(d.ends_at)curLot.auction_ends_at=d.ends_at;
    toast("Ставка принята! Продавец получил ваш контакт");
    openLot(curLot.id);
  }catch(e){toast(e.message)}
  spin(0);
}

function compress(file){return new Promise(res=>{const img=new Image(),r=new FileReader();
  r.onload=()=>{img.onload=()=>{
    function enc(maxDim,qual){let w=img.width,h=img.height;const k=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*k);h=Math.round(h*k);
      const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);return c.toDataURL("image/jpeg",qual);}
    const bytes=d=>Math.ceil((d.length-d.indexOf(",")-1)*3/4);
    let M=1280,q=0.8,out=enc(M,q);
    while(bytes(out)>480000&&q>0.45){q-=0.1;out=enc(M,q);}
    while(bytes(out)>480000&&M>720){M-=160;out=enc(M,0.6);}
    res(out);};
    img.onerror=()=>res(null);img.src=r.result};r.readAsDataURL(file)})}

   <div class="fT">Какой букет ищете?</div>
   <div class="fS">Запрос увидят продавцы вашего города и откликнутся вам прямо в приложении — в анонимном чате.</div>
   <div class="lbl">Описание</div><textarea class="inp" id="rText" maxlength="200" placeholder="Например: большой букет роз завтра к 19:00, заберу сам(а)"></textarea>
   <div class="lbl">Бюджет до, ₽ (необязательно)</div><input class="inp" id="rBud" type="number" inputmode="numeric" placeholder="7000">

async function createReq(){
  spin(1);
  try{
    await api("request_create",{text:$("#rText").value,budget:$("#rBud").value,needed_by:$("#rBy").value,city:U.city});
    closeSheet();toast("Запрос отправлен на модерацию");renderReqs();
  }catch(e){toast(e.message)}
  spin(0);
}
/* ================== встроенный чат ================== */
let chatNow=null,chatPoll=null,chatReturn=null;
function linkify(t){return esc(t).replace(/@([A-Za-z0-9_]{5,32})/g,'<a href="https://t.me/$1" target="_blank">@$1</a>')}
function tHM(iso){const d=new Date(iso);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
async function renderChats(){
  $("#view").innerHTML=`<div class="empty">Загружаю чаты…</div>`;
  let d;try{d=await api("chat_list")}catch(e){return $("#view").innerHTML=`<div class="empty">${esc(e.message)}</div>`}
  if(!d.chats.length)return $("#view").innerHTML=`<div class="empty"><div class="e">💬</div>Чатов пока нет.<br>Напишите продавцу из карточки лота — анонимно, ваш Telegram не раскрывается.</div>`;
  $("#view").innerHTML=`<div class="clist">${d.chats.map(c=>`<div class="hi" onclick='openChat(${JSON.stringify({lot_id:c.lot_id,request_id:c.request_id,peer:c.peer_id})})'>
    ${c.photo?`<img src="${esc(c.photo)}" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="ava" style="display:none">${esc((c.title||"Л")[0])}</div>`:`<div class="ava">${esc((c.title||"Л")[0])}</div>`}
    <div style="flex:1;min-width:0"><b style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.title)}</b><div style="display:flex;align-items:center;gap:5px;margin-top:3px">${c.peer_avatar?`<img src="${esc(c.peer_avatar)}" style="width:18px;height:18px;border-radius:50%;object-fit:cover;flex:none" onerror="this.style.display='none'">`:""}<b style="color:var(--pine);font-weight:700;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.peer_name)}</b></div><small style="display:block;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px">${esc(c.last_text)}</small></div>
    ${c.unread?'<span class="dot"></span>':""}</div>`).join("")}</div>`;
}
async function openChat(ctx){
  chatNow=ctx;
  $("#sbody").innerHTML=`<button class="xbtn" onclick="closeChat()">✕</button>
   ${U.username?`<button class="cgive" onclick="giveUsername()" title="Отправить собеседнику ваш Telegram">↗ Поделиться ником @${esc(U.username)}</button>`:""}
   <div class="chead" onclick="openUserFromChat()" style="display:flex;align-items:center;gap:10px;padding-right:118px;cursor:pointer">
     <div class="ava" id="chAva" style="width:40px;height:40px;font-size:15px;flex:none;overflow:hidden">К</div>
     <div style="flex:1;min-width:0"><b id="chName">Чат</b><div style="font-size:10.5px;color:var(--muted);margin-top:1px">Анонимно · нажмите, чтобы открыть профиль</div></div>
     <span style="color:var(--muted);font-size:18px;flex:none">›</span>
   </div>
   <div style="padding:7px 16px 0;font-size:10.5px;color:var(--muted);line-height:1.45">Общайтесь по поводу лота; ссылки на сторонние площадки и оскорбления не допускаются — чат проверяется по жалобам.</div>
   <div class="cmsgs" id="cmsgs"></div>
   <div class="crow2"><button class="attach" onclick="$('#cImg').click()" title="Отправить фото">📎</button><input id="cImg" type="file" accept="image/*" style="display:none" onchange="sendPhoto(this.files)"><input id="cIn" maxlength="500" placeholder="Сообщение…" onfocus="setTimeout(fitChat,300)" onkeydown="if(event.key==='Enter')sendMsg()"><button onclick="sendMsg()">➤</button></div>
   <button class="rep" style="margin:0 0 4px" onclick="reportChat()">Пожаловаться на собеседника</button>
   <button class="rep" style="margin:0 0 16px;color:var(--muted)" onclick="deleteChat()">Удалить переписку</button>`;
  const sb=$("#sbody");sb.classList.add("chatmode");
  $("#sheet").classList.add("open");
  await loadMsgs(true);
  clearInterval(chatPoll);chatPoll=setInterval(()=>{if(chatNow)loadMsgs(false)},4000);
}
function fitChat(){
  const el=$("#cmsgs");if(el)el.scrollTop=el.scrollHeight;
}
function openChatFromLot(lotId,peer){chatReturn=lotId;openChat({lot_id:lotId,peer:peer});}
function closeChat(){
  clearInterval(chatPoll);chatNow=null;
  const sb=$("#sbody");if(sb)sb.classList.remove("chatmode");
  refreshUnread();
  if(chatReturn){const r=chatReturn;chatReturn=null;openLot(r);return;}
  closeSheet();if(tab==="chats")renderChats();
}
function deleteChat(){
  if(!chatNow)return;
  ask2("Удалить эту переписку у себя? У собеседника она останется, а если придёт новое сообщение — чат вернётся.",async()=>{
    try{await api("chat_hide",{lot_id:chatNow.lot_id||null,request_id:chatNow.request_id||null,peer_id:chatNow.peer});toast("Переписка удалена");chatReturn=null;closeChat();go("chats");}catch(e){toast(e.message)}
  });
}
async function loadMsgs(scroll){
  if(!chatNow)return;
  let d;try{d=await api("chat_messages",{lot_id:chatNow.lot_id||null,request_id:chatNow.request_id||null,peer_id:chatNow.peer})}catch(e){return}
  const el=$("#cmsgs");if(!el)return;
  const nm=$("#chName");if(nm)nm.textContent=d.peer_name;
  const av=$("#chAva");if(av){if(d.peer_avatar){av.innerHTML=`<img src="${esc(d.peer_avatar)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.textContent='${esc((d.peer_name||'К')[0])}'">`;}else{av.textContent=(d.peer_name||'К')[0];}}
  const atBottom=el.scrollHeight-el.scrollTop-el.clientHeight<70;
  const sig=d.messages.length+":"+(d.messages.length?d.messages[d.messages.length-1].at:"");
  if(el._sig!==sig){
    el.innerHTML=d.messages.length?d.messages.map(m=>`<div class="msg ${m.mine?"me":"them"}">${m.photo?`<img class="msgimg" src="${esc(m.photo)}" onclick="viewImg('${esc(m.photo)}')" onerror="this.style.display='none'">`:""}${m.text?linkify(m.text):""}<time>${tHM(m.at)}</time></div>`).join(""):`<div class="msg them">Напишите первое сообщение — собеседник получит уведомление от бота.</div>`;
    el._sig=sig;
    if(scroll||atBottom){el.scrollTop=el.scrollHeight;requestAnimationFrame(()=>{const e=$("#cmsgs");if(e)e.scrollTop=e.scrollHeight;});if(scroll)setTimeout(()=>{const e=$("#cmsgs");if(e)e.scrollTop=e.scrollHeight;},90);}
  } else if(scroll){el.scrollTop=el.scrollHeight;}
}
async function sendMsg(){
  const inp=$("#cIn");const t=(inp.value||"").trim();
  if(!t||!chatNow)return;
  inp.value="";
  try{await api("chat_send",{lot_id:chatNow.lot_id||null,request_id:chatNow.request_id||null,peer_id:chatNow.peer,text:t});loadMsgs(true)}catch(e){toast(e.message)}
}
async function sendPhoto(files){
  if(!files||!files[0]||!chatNow)return;
  spin(1);
  try{
    const d=await compress(files[0]);
    if(!d)throw new Error("Не удалось обработать фото");
    await api("chat_send",{lot_id:chatNow.lot_id||null,request_id:chatNow.request_id||null,peer_id:chatNow.peer,photo:d});
    loadMsgs(true);
  }catch(e){toast(e.message)}
  spin(0);
  const f=$("#cImg");if(f)f.value="";
}
function viewImg(u){
  const d=document.createElement("div");
  d.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:120;display:flex;align-items:center;justify-content:center;padding:14px";
  d.onclick=()=>d.remove();
  d.innerHTML=`<img src="${esc(u)}" style="max-width:100%;max-height:100%;border-radius:8px">`;
  document.body.appendChild(d);
}
function giveUsername(){
  $("#cIn").value="Мой Telegram: @"+U.username+" — можно продолжить в личке";
  sendMsg();
}
function reportChat(){
  const b=event.target;
  b.outerHTML=`<div style="display:flex;gap:8px;margin:0 14px 16px"><input class="inp" id="repCIn" maxlength="200" placeholder="Что случилось? (коротко)" style="padding:11px"><button onclick="sendReportChat()" style="background:var(--rasp);color:#fff;border:none;border-radius:11px;padding:0 16px;font-weight:800;cursor:pointer">ОК</button></div>`;
}
async function sendReportChat(){
  const r=($("#repCIn").value||"").trim();if(!r)return toast("Опишите проблему");
  try{await api("report",{lot_id:(chatNow&&chatNow.lot_id)||null,request_id:(chatNow&&chatNow.request_id)||null,peer_id:(chatNow&&chatNow.peer)||null,reason:"[чат] "+r});toast("Жалоба отправлена модератору")}catch(e){toast(e.message)}
}
async function closeReq(id){
  try{await api("request_close",{request_id:id});toast("Запрос закрыт");renderReqs()}catch(e){toast(e.message)}
}

/* ================== профиль ================== */
const STATUS={moderation:["mod","Модерация"],active:["act","Активен"],rejected:["rej","Отклонён"],sold:["sold","Продан"],expired:["exp","Истёк"]};
function myLotRow(l){
  const st=STATUS[l.status]||["exp",l.status];
  const ended=l.sale_type==="auction"&&l.auction_ends_at&&Date.now()>Date.parse(l.auction_ends_at);
  return `<div class="hi"><div class="top"><div><b>${esc(l.title)}</b>
       <small>${l.sale_type==="auction"?`Аукцион · текущая ${rub(l.current_price)}${ended&&l.status==="active"?" · финал — выберите победителя":""}`:`Фикс ${rub(l.fixed_price)}`}${l.status==="rejected"?` · ${esc(l.reject_reason||"")}`:""}</small></div>
       <span class="st ${st[0]}">${st[1]}</span></div>
      ${l.status==="active"&&l.sale_type==="auction"&&l.bids.length?`<div class="mini">${l.bids.slice(0,6).map(b=>`<button class="win" onclick="pickWin('${l.id}','${b.id}')">★ ${rub(b.amount)} — ${esc(b.name)}</button><button onclick="openChat({lot_id:'${l.id}',peer:'${b.bidder_id}'})">💬</button><button onclick="openUser('${b.bidder_id}')">👤</button>`).join("")}</div><small style="display:block;margin-top:6px;color:var(--muted)">★ — выбрать победителем, 💬 — чат, 👤 — профиль участника</small>`:""}
      ${l.status==="active"?`<div class="mini">${l.sale_type==="fixed"?`<button class="win" onclick="markSold('${l.id}')">✓ Продано</button>`:""}<button class="del" onclick="cancelLot('${l.id}')">Снять лот</button></div>`:""}
      ${l.status==="expired"&&(l.relist_count||0)<2?`<div class="mini"><button class="win" onclick="extendLot('${l.id}')">↻ Продлить на 5 дней</button></div>`:""}
      ${l.status==="sold"&&l.winner_user?`<div class="mini"><button class="win" onclick="openChat({lot_id:'${l.id}',peer:'${l.winner_user}'})">💬 Чат с покупателем${l.winner_name?" · "+esc(l.winner_name):""}</button><button onclick="openUser('${l.winner_user}')">👤</button></div>`:""}
      ${l.status==="sold"&&l.winner_user?(l.rated?`<small style="display:block;margin-top:6px;color:var(--ok);font-weight:800">Покупатель оценён ✓</small>`:`<div style="margin-top:8px"><small style="color:var(--muted)">Оцените покупателя:</small><div class="starrow" data-lot="${l.id}">${[1,2,3,4,5].map(s=>`<b onclick="rate('${l.id}',${s},this)">★</b>`).join("")}</div></div>`):""}
      ${l.status==="sold"&&l.charity_pct?(l.charity_proof?`<div style="margin-top:8px;font-size:11.5px;color:var(--ok);font-weight:800">❤ Чек о переводе ${l.charity_pct}% приложен ✓</div>`:`<div class="mini"><button class="win" onclick="$('#chFile_${l.id}').click()">❤ Приложить чек о переводе ${l.charity_pct}%</button><input id="chFile_${l.id}" type="file" accept="image/*" style="display:none" onchange="uploadCharity('${l.id}',this.files)"></div>`):""}
     </div>`;
}
async function renderProf(){
  $("#view").innerHTML=`<div class="empty">Загружаю профиль…</div>`;
  let p,ml,mp;
  try{[p,ml,mp]=await Promise.all([api("profile"),api("my_lots"),api("my_purchases")])}
  catch(e){return $("#view").innerHTML=`<div class="empty">${esc(e.message)}</div>`}
  const r=p.rating;
  myDisp=(p.display_name||"").trim();
  const dn=myDisp||p.first_name||"К";
  const pic=(p.avatar||"").trim();
  $("#view").innerHTML=`
   <div class="pcard"><div style="position:relative;width:64px;margin:0 auto 2px">
     <div class="ava" style="width:64px;height:64px;font-size:24px;overflow:hidden">${pic?`<img src="${esc(pic)}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.parentNode.textContent='${esc(dn[0])}'">`:esc(dn[0])}</div>
     <button onclick="pickAvatar()" title="Загрузить фото профиля" style="position:absolute;right:-4px;bottom:-4px;width:26px;height:26px;border-radius:50%;border:2px solid var(--paper);background:var(--rasp);color:#fff;font-size:19px;font-weight:400;line-height:22px;text-align:center;cursor:pointer;padding:0">+</button>
     <input id="avFile" type="file" accept="image/*" style="display:none" onchange="uploadAvatar(this.files)">
   </div>
    <h3 id="pname" style="position:relative;display:inline-block">${esc(dn)}<button onclick="editName()" style="position:absolute;left:100%;top:50%;transform:translateY(-50%);margin-left:6px;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:0">✎</button></h3>
    <div class="sub">${p.username?"@"+esc(p.username)+" · ":""}${esc(p.city||"")}</div></div>
   <div class="rrow">
    <div class="rbox"><b>${r.seller??"—"}</b><small>продавец${r.seller_n?` (${r.seller_n})`:""}</small></div>
    <div class="rbox"><b>${r.buyer??"—"}</b><small>покупатель${r.buyer_n?` (${r.buyer_n})`:""}</small></div>
    <div class="rbox"><b>${p.sold+p.bought}</b><small>сделок</small></div>
   </div>
   <div class="lbl" style="margin-top:18px">Мои лоты</div>
   ${(()=>{ if(!ml.lots.length)return `<div class="hi"><small>Лотов пока нет — нажмите «Разместить», когда появится букет.</small></div>`;
     const groups=[["active","Активные"],["moderation","На модерации"],["expired","Истёкшие"],["rejected","Отклонённые"],["sold","Проданные"]];
     const known=groups.map(g=>g[0]); let out="";
     for(const [g,label] of groups){const arr=ml.lots.filter(l=>l.status===g);if(!arr.length)continue;
       out+=`<details ${g==="active"?"open":""} style="margin-top:8px"><summary class="lbl" style="cursor:pointer;${g==="sold"?"color:var(--ok)":""}">${label} (${arr.length})</summary>${arr.map(myLotRow).join("")}</details>`;}
     const other=ml.lots.filter(l=>!known.includes(l.status));if(other.length)out+=other.map(myLotRow).join("");
     return out; })()}
   <div class="lbl">Мои покупки</div>
   ${mp.lots.length?mp.lots.map(l=>`<div class="hi"><div class="top"><div><b>${esc(l.title)}</b>
      <small>${rub(l.price)} · продавец ${esc(l.seller_name)}</small></div><button class="resp" onclick="openChat({lot_id:'${l.id}',peer:'${l.seller_id}'})">💬 Чат</button></div>
      ${l.pending
        ? `<div class="mini"><button class="win" onclick="confirmReceived('${l.id}')">✓ Я получил(а) букет</button></div><small style="display:block;margin-top:5px;color:var(--muted)">Подтвердите получение — потом сможете оценить продавца. Необязательно.</small>`
        : (l.rated?'<small style="color:var(--ok);font-weight:800">Оценка оставлена ✓</small>':`<div class="starrow" data-lot="${l.id}">${[1,2,3,4,5].map(s=>`<b onclick="rate('${l.id}',${s},this)">★</b>`).join("")}</div><small>Оцените сделку — это формирует рейтинг продавца</small>`)}
   </div>`).join(""):`<div class="hi"><small>Покупок пока нет.</small></div>`}
   ${p.last_rates.length?`<div class="lbl">Последние оценки обо мне</div>${p.last_rates.map(x=>`<div class="hi"><b style="color:var(--gold)">${"★".repeat(x.stars)}</b> <small style="display:inline">${esc(x.comment||"")}</small></div>`).join("")}`:""}
   <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn ghost" style="margin:0;flex:1" onclick="addHome()">📲 На экран «Домой»</button>
    <button class="btn ghost" style="margin:0;flex:1" onclick="shareApp()">↗ Поделиться</button>
   </div>
   <div class="legal">Поддержка: ${esc(CFG.SUPPORT)}<br>
    <a href="${CFG.OFFER_URL}" target="_blank">Пользовательское соглашение</a> · <a href="${CFG.PRIVACY_URL}" target="_blank">Политика конфиденциальности</a> · <a href="${CFG.CONSENT_URL}" target="_blank">Согласие на обработку ПДн</a></div>`;
}
function pickWin(lotId,bidId){
  ask2("Выбрать эту ставку победителем?",async()=>{
    spin(1);
    try{const d=await api("pick_winner",{lot_id:lotId,bid_id:bidId});toast(`Победитель выбран${d.winner_name?": "+d.winner_name:""}! Договоритесь о встрече в чате`);renderProf()}
    catch(e){toast(e.message)}
    spin(0);
  });
}
function markSold(id){
  ask2("Вы продали этот букет?",async()=>{
    spin(1);try{await api("mark_sold",{lot_id:id});toast("Готово! Оцените покупателя ниже ↓");renderProf()}catch(e){toast(e.message)}spin(0);
  });
}
function confirmReceived(id){
  ask2("Подтвердить, что вы получили букет? Сделка будет завершена, после этого можно оценить продавца.",async()=>{
    spin(1);
    try{await api("confirm_received",{lot_id:id});toast("Готово! Теперь можно оценить продавца");renderProf();}
    catch(e){toast(e.message)}
    spin(0);
  });
}
function cancelLot(id){
  ask2("Снять лот с публикации?",async()=>{
    spin(1);try{await api("cancel_lot",{lot_id:id});toast("Лот снят");renderProf()}catch(e){toast(e.message)}spin(0);
  });
}
async function extendLot(id){
  spin(1);try{await api("extend_lot",{lot_id:id});toast("Лот снова в ленте");renderProf()}catch(e){toast(e.message)}spin(0);
}
async function uploadCharity(id,files){
  if(!files||!files[0])return;
  spin(1);
  try{const d=await compress(files[0]);if(!d)throw new Error("Не удалось обработать фото");
    await api("charity_proof",{lot_id:id,photos:[d]});toast("Чек приложен — покупатель уведомлён");renderProf();
  }catch(e){toast(e.message)}
  spin(0);
}
function rate(lotId,stars,el){
  const row=el.parentNode;[...row.children].forEach((b,i)=>b.classList.toggle("on",i<stars));
  row.dataset.sel=stars;
  if(!document.getElementById("rc_"+lotId)){
    row.insertAdjacentHTML("afterend",`<div style="display:flex;gap:8px;margin-top:8px"><input class="inp" id="rc_${lotId}" maxlength="200" placeholder="Пара слов (необязательно)" style="padding:10px"><button onclick="submitRate('${lotId}')" style="background:var(--pine);color:#fff;border:none;border-radius:10px;padding:0 16px;font-weight:800;cursor:pointer">→</button></div>`);
  }
}
async function submitRate(lotId){
  const row=document.querySelector('.starrow[data-lot="'+lotId+'"]');
  const stars=Number((row&&row.dataset.sel)||0);if(!stars)return toast("Выберите оценку звёздами");
  const inp=document.getElementById("rc_"+lotId);const c=((inp&&inp.value)||"").trim();
  spin(1);
  try{await api("rate",{lot_id:lotId,stars,comment:c});toast("Спасибо! Оценка учтена");renderProf()}catch(e){toast(e.message)}
  spin(0);
}

function addHome(){
  try{ if(tgApp && tgApp.addToHomeScreen){ tgApp.addToHomeScreen(); return; } }catch(e){}
  toast("Доступно в свежих версиях Telegram — обновите приложение");
}
function shareApp(){
  const link="https://t.me/"+CFG.BOT;
  const txt="Кензан — вторая жизнь цветам. Свежие букеты ниже цен салонов, от людей и магазинов твоего города:";
  const url="https://t.me/share/url?url="+encodeURIComponent(link)+"&text="+encodeURIComponent(txt);
  try{ if(tgApp && tgApp.openTelegramLink){ tgApp.openTelegramLink(url); return; } }catch(e){}
  window.open(url,"_blank");
}
let myDisp="";
function editName(){
  const h=document.getElementById("pname"); if(!h)return;
  h.outerHTML=`<div style="display:flex;gap:8px;justify-content:center;align-items:center;margin:4px 0 2px"><input class="inp" id="nmIn" maxlength="40" value="${esc(myDisp)}" placeholder="Ваше имя в чатах" style="max-width:210px;padding:9px"><button onclick="saveName()" style="background:var(--pine);color:#fff;border:none;border-radius:10px;padding:0 14px;font-weight:800;cursor:pointer">OK</button></div>`;
  const i=document.getElementById("nmIn"); if(i)i.focus();
}
async function saveName(){
  const v=((document.getElementById("nmIn")||{}).value||"").trim();
  spin(1);
  try{ await api("set_name",{name:v}); toast("Имя обновлено"); renderProf(); }catch(e){ toast(e.message); }
  spin(0);
}
function pickAvatar(){const f=$("#avFile");if(f)f.click();}
async function uploadAvatar(files){
  if(!files||!files[0])return;
  spin(1);
  try{
    const d=await compress(files[0]);
    if(!d)throw new Error("Не удалось обработать фото — попробуйте другое");
    const r=await api("set_avatar",{photos:[d]});
    if(U)U.avatar=r.avatar;
    toast("Фото профиля обновлено");
    renderProf();
  }catch(e){toast(e.message)}
  spin(0);
}
/* ================== город ================== */
function openCity(){
  $("#sbody").innerHTML=`<button class="xbtn" onclick="closeSheet()">✕</button><div class="sin" style="padding-top:50px">
   <div class="fT">Город и охват</div>
   <div class="fS">Кензан запускается постепенно — пока работаем в нескольких городах. Укажите свой город и решите, что показывать в ленте.</div>
   <div class="lbl">Мой город</div>
   <select class="inp" id="cityIn" style="appearance:none;-webkit-appearance:none">${CITIES.map(c=>`<option value="${c}" ${U.city===c?"selected":""}>${c}</option>`).join("")}</select>
   <button class="btn ghost" style="margin-top:8px" onclick="askCity()">Моего города нет в списке</button>
   <div class="lbl">Показывать в ленте</div>
   <div class="opt"><span class="${!scopeAll?"on":""}" onclick="scopeAll=false;openCity()">Только мой город</span><span class="${scopeAll?"on":""}" onclick="scopeAll=true;openCity()">Вся Россия</span></div>
   <button class="btn" onclick="saveCity()">Сохранить</button></div>`;
  $("#sheet").classList.add("open");
}
function askCity(){
  const cur=tab;
  $("#sbody").innerHTML=`<button class="xbtn" onclick="closeSheet()">✕</button><div class="sin" style="padding-top:50px">
   <div class="fT">Какого города не хватает?</div>
   <div class="fS">Мы открываем новые города по мере спроса. Напишите свой — и как только наберётся достаточно желающих, мы откроем его. Можно также написать нам в поддержку (просто сообщение боту).</div>
   <div class="lbl">Ваш город</div><input class="inp" id="askCityIn" maxlength="60" placeholder="Например: Казань">
   <button class="btn" onclick="sendCityReq()">Отправить</button></div>`;
  $("#sheet").classList.add("open");
}
async function sendCityReq(){
  const c=($("#askCityIn").value||"").trim();
  if(!c)return toast("Укажите город");
  spin(1);
  try{await api("city_request",{city_text:c});closeSheet();toast("Спасибо! Учтём ваш город при расширении")}catch(e){toast(e.message)}
  spin(0);
}
async function saveCity(){
  const c=$("#cityIn").value.trim();
  if(!c)return toast("Укажите город");
  spin(1);
  try{
    if(c!==U.city){await api("set_city",{city:c});U.city=c}
    $("#cityLbl").textContent=scopeAll?"Вся Россия":U.city;
    closeSheet();if(tab==="feed")renderFeed();else if(tab==="req")renderReqs();
  }catch(e){toast(e.message)}
  spin(0);
}

boot();
</script>
