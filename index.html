<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Кензан — вторая жизнь цветам, цены ниже рыночных</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
<style>
:root{--pine:#14352B;--pine2:#1E4A3C;--ivory:#FBF7EF;--paper:#FFF;--ink:#232C27;--muted:#8B948E;--rasp:#C84E72;--gold:#C8A24B;--line:#ECE5D8;--bg:#F6F1E8;--ok:#2E7D52;--warn:#A36B12;--sage:#EAF0EA;--blush:#F7E1E9;--blushInk:#A8385C;--sh:0 6px 22px rgba(20,53,43,.08);--shc:0 3px 14px rgba(20,53,43,.07)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);display:flex;flex-direction:column;max-width:520px;margin:0 auto;height:100dvh;overflow:hidden;position:fixed;top:0;left:0;right:0}
button{font-family:'Inter'}
.hdr{background:var(--ivory);color:var(--pine);padding:calc(9px + var(--tg-safe-area-inset-top,0px) + var(--tg-content-safe-area-inset-top,0px)) 14px 9px;flex:none;border-bottom:1px solid var(--line)}
.hdr-top{position:relative;display:flex;align-items:center;justify-content:center;min-height:38px}
.hdr-l{position:absolute;left:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:7px}
.brand{font-family:'Prata',serif;font-size:22px;color:var(--pine)}
.brand i{font-style:normal;color:#E2A6BC}
.city{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);color:var(--pine);border-radius:99px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;max-width:42%}
.city span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:4px;text-align:center}
.chips{display:flex;gap:8px;overflow-x:auto;padding:11px 14px 3px;scrollbar-width:none;flex:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:7px 13px;border-radius:99px;background:var(--paper);border:1px solid var(--line);font-size:12.5px;font-weight:700;cursor:pointer}
.chip.on{background:var(--pine);color:var(--ivory);border-color:var(--pine)}
.scroll{flex:1;overflow-y:auto;padding:10px 14px 112px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--paper);border-radius:18px;overflow:hidden;cursor:pointer;position:relative;box-shadow:var(--shc)}
.card:active{transform:scale(.98)}
.ph{position:relative;height:235px;background:#E7E1D2}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.fav{position:absolute;top:8px;right:8px;width:31px;height:31px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--rasp);z-index:3;cursor:pointer;border:none;box-shadow:0 1px 5px rgba(0,0,0,.12)}
.fmt{position:absolute;top:8px;left:8px;font-size:10px;font-weight:800;padding:4px 9px;border-radius:99px;color:#fff;z-index:2}
.fmt.auc{background:rgba(200,78,114,.93)}.fmt.fix{background:rgba(46,125,82,.93)}.fmt.char{background:rgba(200,78,114,.93)}
.sz{position:absolute;top:8px;left:8px;min-width:24px;height:24px;padding:0 6px;border-radius:8px;background:rgba(255,255,255,.93);color:var(--pine);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;z-index:2}
.szb{position:absolute;right:8px;bottom:8px;background:rgba(255,255,255,.93);color:var(--pine);font-size:11px;font-weight:800;padding:3px 8px;border-radius:8px;z-index:3;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.fav svg,.favbig svg,.hbtn svg{display:block}
.cline{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;flex-wrap:nowrap;overflow:hidden;white-space:nowrap;padding:9px 11px 11px}
.cf{color:var(--pine)}.cf.auc{color:var(--pine)}.cf.fix{color:var(--pine)}.cst{color:var(--muted);overflow:hidden;text-overflow:ellipsis}
.cdot{color:#d8d2c4}
.cch{color:var(--blushInk);display:flex;align-items:center;gap:3px}
.cbadges{position:absolute;top:8px;left:8px;display:flex;gap:5px;z-index:2}
.povr{position:absolute;left:0;right:0;bottom:0;padding:20px 10px 9px;background:linear-gradient(transparent,rgba(0,0,0,.5));z-index:2}
.pp{color:#fff;font-weight:800;font-size:16px;text-shadow:0 1px 4px rgba(0,0,0,.45)}
.pp em{font-style:normal;font-size:10.5px;font-weight:700;opacity:.85;margin-left:4px}
.pfmt{display:block;color:#fff;font-size:11px;font-weight:700;opacity:.95;text-shadow:0 1px 3px rgba(0,0,0,.5);margin-top:2px}
.ptimer{position:absolute;top:8px;right:46px;background:rgba(255,255,255,.93);border-radius:99px;padding:4px 8px;font-size:10.5px;font-weight:800;color:var(--pine);z-index:3;display:flex;align-items:center;gap:4px}
.soldov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.95);color:var(--blushInk);font-weight:800;font-size:12.5px;padding:6px 15px;border-radius:99px;box-shadow:0 2px 10px rgba(0,0,0,.18);z-index:3}
.tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.tg{font-size:12px;font-weight:600;padding:6px 11px;border-radius:9px;display:inline-flex;align-items:center;gap:4px}
.tg.cat{background:#EFEAF7;color:#6B4FA0}.tg.sz{background:#F1EFE8;color:#5F5E5A}.tg.szc{background:#F1EFE8;color:#5F5E5A}.tg.fr{background:#E7F2EA;color:#2E7D52}.tg.mt{background:#FBEAF0;color:var(--blushInk)}.tg.fmt{background:var(--sage);color:var(--pine)}.tg.g{background:var(--sage);color:var(--pine)}.tg.got{background:#F6ECD6;color:#946A14}
.ltitle{font-size:16.5px;font-weight:700;margin-top:3px;color:var(--ink)}
.sharebtn{position:absolute;top:calc(54px + var(--tg-safe-area-inset-top,0px) + var(--tg-content-safe-area-inset-top,0px));right:12px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.93);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--pine);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);z-index:5}
.tag{position:absolute;top:8px;left:8px;background:rgba(20,53,43,.88);color:var(--ivory);font-size:9.5px;font-weight:800;border-radius:6px;padding:4px 7px;z-index:2}
.tag.gold{background:rgba(146,112,33,.92)}
.taglist{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;align-items:flex-start;max-width:64%;z-index:2}
.taglist .tag{position:static;max-width:100%;line-height:1.25}
.petals{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,.93);border-radius:99px;padding:4px 8px;display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;color:var(--pine);box-shadow:0 1px 4px rgba(0,0,0,.12);z-index:2}
.pdot{display:flex;gap:2px}
.pdot s{width:6px;height:6px;border-radius:50% 50% 50% 0;background:var(--rasp);transform:rotate(-45deg);display:block}
.pdot s.off{background:#E4DCCF}
.soldbadge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-8deg);background:rgba(178,58,96,.94);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:17px;font-weight:800;letter-spacing:1px;padding:6px 20px;border-radius:8px;box-shadow:0 3px 12px rgba(0,0,0,.3);z-index:2;text-transform:uppercase}
.card.sold .ph img{filter:grayscale(.25) brightness(.9)}
.card.sold .cprice{color:var(--muted);text-decoration:line-through}
.cbody{padding:10px 12px 12px}
.cprice{font-family:'Inter',sans-serif;font-weight:700;font-size:17px;color:var(--pine)}
.cprice em{font-style:normal;font-size:11.5px;color:var(--muted);text-decoration:line-through;font-family:'Inter';font-weight:600;margin-left:6px}
.cmeta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.crow{display:flex;align-items:center;justify-content:space-between;margin-top:7px;font-size:10.5px;font-weight:800}
.bn{color:var(--rasp)}.bn.fix{color:var(--ok)}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(9px + max(env(safe-area-inset-bottom),var(--tg-safe-area-inset-bottom,0px)));width:calc(100% - 24px);max-width:472px;background:var(--ivory);border:1px solid var(--line);border-radius:24px;display:flex;padding:7px 6px;box-shadow:0 10px 28px rgba(20,53,43,.18);z-index:30}
.nv{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;color:#9AA29C;font-size:10.5px;font-weight:800;cursor:pointer;padding:5px 0}
.nv svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nv.on{color:var(--pine)}
.nv:active{transform:scale(.9)}
.nv .pk{background:var(--rasp);color:#fff;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-22px;box-shadow:0 6px 16px rgba(200,78,114,.42);border:3px solid var(--ivory)}
.nv .pk svg{width:20px;height:20px;stroke-width:2.2}
body.kb-open .nav,body.kb-open #reqFab{display:none!important}
body:not(.ready) .hdr,body:not(.ready) .chips,body:not(.ready) #view,body:not(.ready) .nav,body:not(.ready) #reqFab{visibility:hidden!important}
body.kb-open{height:calc(100dvh - var(--kb,0px))}
body.kb-open.formsheet{height:100dvh}
.sheet{position:fixed;inset:0;background:rgba(15,28,23,.55);z-index:40;display:none;align-items:flex-end;justify-content:center}
.sheet.open{display:flex}
.sbody{background:var(--ivory);width:100%;max-width:520px;max-height:92dvh;border-radius:24px 24px 0 0;overflow-y:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.sheet.formmode{padding-bottom:0}
.sheet.formmode .sbody{max-height:calc(100dvh - 44px);padding-bottom:var(--kb,0px);transition:padding-bottom .24s cubic-bezier(.32,.72,0,1)}
.sheetx{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;background:#ECE7DA;border:none;color:var(--pine);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5}
.sheetx:active{transform:scale(.92)}
.gal{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;height:min(50vh,400px);background:#E7E1D2}
.gal img{width:100%;flex:none;object-fit:cover;scroll-snap-align:center}
.galwrap{position:relative}
.galdots{position:absolute;left:0;right:0;bottom:11px;display:flex;justify-content:center;gap:6px;z-index:4;pointer-events:none}
.galdots s{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.6);box-shadow:0 1px 3px rgba(0,0,0,.4);transition:width .2s,background .2s}
.galdots s.on{background:#fff;width:17px;border-radius:4px}
.xbtn{position:absolute;top:calc(8px + var(--tg-safe-area-inset-top,0px) + var(--tg-content-safe-area-inset-top,0px));left:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.93);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);z-index:5}
.sin{padding:16px 18px 28px}
.sprice{font-family:'Inter',sans-serif;font-weight:700;font-size:23px;color:var(--pine)}
.sprice em{font-style:normal;font-size:13.5px;color:var(--muted);text-decoration:line-through;font-family:'Inter';font-weight:600;margin-left:8px}
.save{display:inline-block;background:#EAF3EC;color:var(--ok);font-size:11.5px;font-weight:800;border-radius:8px;padding:4px 9px;margin-top:6px}
.kv{margin-top:14px;border-top:1px solid var(--line);padding-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;font-size:13px}
.kv b{display:block;font-size:10.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.seller{margin-top:14px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;align-items:center;gap:11px}
.ava{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#9DB89F,#1D4A3C);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex:none}
.seller .nm{font-weight:800;font-size:13.5px}
.seller .rt{font-size:11.5px;color:var(--muted);margin-top:2px}
.seller .rt i{font-style:normal;color:var(--gold);font-weight:800}
.auc{margin-top:14px;background:var(--pine);border-radius:16px;padding:14px;color:var(--ivory)}
.auc h4{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:rgba(251,247,239,.6);display:flex;justify-content:space-between;align-items:center}
.auc h4 span{font-size:13px;letter-spacing:0;text-transform:none;font-weight:800;color:#F0C8D4}
.bidlist{margin-top:10px;display:flex;flex-direction:column;gap:7px;max-height:130px;overflow-y:auto}
.bid{display:flex;justify-content:space-between;font-size:12.5px;background:rgba(255,255,255,.07);border-radius:9px;padding:7px 10px}
.bidrow{display:flex;gap:8px;margin-top:12px}
.bidrow input{flex:1;border:none;border-radius:11px;padding:12px;font-size:16px;font-weight:700;font-family:'Inter';background:rgba(255,255,255,.95);color:var(--ink);caret-color:var(--pine)}
.bidrow button{background:var(--rasp);border:none;color:#fff;font-weight:800;font-size:13.5px;border-radius:11px;padding:0 18px;cursor:pointer}
.hint{font-size:10.5px;color:rgba(251,247,239,.55);margin-top:8px;line-height:1.5}
.btn{display:block;width:100%;margin-top:14px;background:var(--rasp);border:none;color:#fff;font-weight:800;font-size:15px;border-radius:15px;padding:15px;cursor:pointer;text-align:center;box-shadow:0 8px 18px rgba(200,78,114,.26)}
.btn.green{background:var(--pine);box-shadow:0 8px 18px rgba(20,53,43,.18)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--pine);box-shadow:none}
.btn:disabled{opacity:.55}
.safety{margin-top:14px;background:#FCF6E8;border:1px solid #EFE2BE;border-radius:13px;padding:12px;font-size:11.5px;line-height:1.6;color:#6B5B2E}
.safety b{display:block;margin-bottom:3px;font-size:12px}
.rep{display:block;text-align:center;margin-top:12px;font-size:11.5px;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;width:100%}
.steps{display:flex;gap:6px;margin:4px 2px 16px}
.steps i{flex:1;height:4px;border-radius:4px;background:var(--line)}
.steps i.on{background:var(--rasp)}
.fT{font-family:'Inter',sans-serif;font-weight:700;font-size:21px;color:var(--pine);margin-bottom:4px}
.fS{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:14px}
.upload{border:2px dashed #CFC7B4;border-radius:16px;background:var(--paper);padding:22px 16px;text-align:center;cursor:pointer}
.upload p{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.5}
.thumbs{display:flex;gap:8px;margin-top:10px}
.thumbs img{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--line);display:block}
.thumb{position:relative;flex:none}
.thumbx{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:var(--rasp);color:#fff;border:2px solid var(--ivory);font-size:14px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.codebox{margin-top:14px;background:var(--pine);color:var(--ivory);border-radius:14px;padding:14px;text-align:center}
.codebox small{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:rgba(251,247,239,.55)}
.codebox b{font-family:'Courier New',monospace;font-size:23px;letter-spacing:3px;display:block;margin-top:4px}
.codebox p{font-size:11px;color:rgba(251,247,239,.7);margin-top:7px;line-height:1.5}
.lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:15px 0 7px}
.opt{display:flex;gap:8px;flex-wrap:wrap}
.opt span{padding:9px 13px;border-radius:11px;background:var(--paper);border:1.5px solid var(--line);font-size:12.5px;font-weight:700;cursor:pointer}
.opt span.on{border-color:var(--rasp);color:var(--rasp);background:#FBF0F3}
.inp{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:16px;font-family:'Inter';font-weight:600;background:var(--paper);color:var(--ink);caret-color:var(--pine)}
.inp:focus{outline:none;border-color:var(--pine)}
textarea.inp{resize:none;min-height:74px}
.fee{margin-top:12px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6}
.fee b{color:var(--ok)}
.done{text-align:center;padding:36px 10px}
.done .big{font-size:52px}
.done h3{font-family:'Inter',sans-serif;font-weight:700;font-size:22px;color:var(--pine);margin-top:14px}
.done p{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.65}
.req{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:11px}
.req h4{font-size:15px;font-weight:800;padding-right:88px;line-height:1.3}
.req .m{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.55}
.req .b{display:inline-block;margin-top:9px;background:#F3EDFB;color:#6B4FA0;font-size:11px;font-weight:800;border-radius:8px;padding:4px 9px}
.req .resp{float:right;background:var(--pine);color:var(--ivory);border:none;border-radius:9px;padding:8px 12px;font-size:11.5px;font-weight:800;cursor:pointer}
.banner{background:linear-gradient(120deg,var(--pine),var(--pine2));border-radius:14px;color:var(--ivory);padding:11px 14px;margin-bottom:12px}
.banner h3{font-family:'Inter',sans-serif;font-weight:700;font-size:14.5px}
.banner p{font-size:11.5px;color:rgba(251,247,239,.72);margin-top:3px;line-height:1.45}
.pcard{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center}
.pcard h3{font-family:'Inter',sans-serif;font-weight:700;font-size:19px;margin-top:8px;color:var(--pine)}
.pcard .sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5}
.rrow{display:flex;gap:8px;margin-top:10px}
.rbox{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:9px 7px;text-align:center}
.rbox b{font-family:'Inter',sans-serif;font-weight:700;font-size:17px;color:var(--pine);display:block}
.rbox small{font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:700;line-height:1.2;display:block;margin-top:2px}
.hi{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:9px;font-size:12.5px}
.hi .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hi b{font-size:13px}
.hi small{color:var(--muted);font-size:12px;display:block;margin-top:3px;line-height:1.5}
details.lotcard>summary{list-style:none;display:flex;align-items:center;gap:8px;cursor:pointer}
details.lotcard>summary::-webkit-details-marker{display:none}
details.lotcard .chev{color:var(--muted);font-size:18px;flex:none;transition:transform .2s}
details.lotcard[open] .chev{transform:rotate(90deg)}
.st{font-size:10px;font-weight:800;border-radius:7px;padding:3px 8px;flex:none}
.st.mod{background:#FCF3DD;color:var(--warn)}.st.act{background:#EAF3EC;color:var(--ok)}

// ===== Клавиатура (iOS-Telegram = overlay). Движок переписан (см. calibrateKb):
// подняли ОДИН раз на фокус к известной высоте _kbH; ОДНА сверка после доводки (кламп
// 150..460 + только вверх); и НИЧЕГО не двигаем до расфокуса. Погоня за visualViewport во
// время набора = дрожь / падение «вниз-вверх» / заползание вверх. Драйвер один: --kb.
// _kbActive — латч сессии (НЕ мгновенный document.activeElement: iOS даёт транзиентный blur).
function _isInput(t){return t&&t.matches&&t.matches("input,textarea,select");}
const _vv=window.visualViewport;
let _kbH=320,_kbActive=false,_calT=0,_kbCal=false;
const _ds=document.documentElement.style;
function applyKb(px){_ds.setProperty("--kb",px+"px");}
function measureKb(){if(!_vv)return 0;return Math.max(0,Math.round(window.innerHeight-_vv.height-(_vv.offsetTop||0)));}
function calibrateKb(){
  if(!_kbActive)return;
  const kb=measureKb();
  if(kb>=150&&kb<=460){
    if(!_kbCal){_kbCal=true;if(Math.abs(kb-_kbH)>=6){_kbH=kb;applyKb(kb);}} // первая сверка за сессию приложения — точная
    else if(kb>_kbH+6){_kbH=kb;applyKb(kb);}                                // далее только вверх (короткая цифровая клава не роняет лист)
  }
  const el=$("#cmsgs");if(el)el.scrollTop=el.scrollHeight;
}
if(_vv){
  // во время активной сессии vv-события НЕ трогают --kb (это и был источник дрожи/падений);
  // только держим окно у нуля. Без сессии — гарантируем опускание.
  const onVV=()=>{if(!_kbActive){applyKb(0);}else if(window.scrollY||window.pageYOffset){window.scrollTo(0,0);}};
  _vv.addEventListener("resize",onVV);_vv.addEventListener("scroll",onVV);
}
document.addEventListener("focusin",e=>{
  if(!_isInput(e.target))return;
  _kbActive=true;
  document.body.classList.add("kb-open");
  if(window.scrollY||window.pageYOffset)window.scrollTo(0,0);
  applyKb(_kbH);

  // scrollIntoView нужен только формам в #view (renderSell)/онбординге; лист (#sheet) поднимается сам.
  if(t.closest&&!t.closest("#sheet")){setTimeout(()=>{if(document.activeElement===t){try{t.scrollIntoView({block:"nearest"});}catch(_){}}},380);}
});
document.addEventListener("focusout",()=>{setTimeout(()=>{if(!_isInput(document.activeElement)){_kbActive=false;document.body.classList.remove("kb-open");applyKb(0);if(window.scrollY||window.pageYOffset)window.scrollTo(0,0);}},120);});

document.addEventListener("touchend",e=>{const a=document.activeElement;if(!a||(a.tagName!=="INPUT"&&a.tagName!=="TEXTAREA"))return;if(e.target.closest&&e.target.closest("input,textarea,button,select,label,a"))return;const t=e.changedTouches[0];if(t&&_tapX!=null&&Math.abs(t.clientX-_tapX)<10&&Math.abs(t.clientY-_tapY)<10){a.blur();_suppressClick=true;setTimeout(()=>{_suppressClick=false;},450);}},{passive:true});

function compress(file){return new Promise(res=>{const img=new Image(),r=new FileReader();
  r.onload=()=>{img.onload=()=>{
    function enc(maxDim,qual){let w=img.width,h=img.height;const k=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*k);h=Math.round(h*k);
      const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);return c.toDataURL("image/jpeg",qual);}
    const bytes=d=>Math.ceil((d.length-d.indexOf(",")-1)*3/4);
    let M=1280,q=0.8,out=enc(M,q);
    while(bytes(out)>480000&&q>0.45){q-=0.1;out=enc(M,q);}
    while(bytes(out)>480000&&M>720){M-=160;out=enc(M,0.6);}
    res(out);};
    img.onerror=()=>res(null);img.src=r.result};r.readAsDataURL(file)})}

function chatListSwipe(){
  document.querySelectorAll("#view .clist .hi").forEach(row=>{
    let x0=0,y0=0,dx=0,drag=false,swipedAt=0;
    row.addEventListener("touchstart",ev=>{const t=ev.touches[0];x0=t.clientX;y0=t.clientY;dx=0;drag=false;row.style.transition="none";},{passive:true});
    row.addEventListener("touchmove",ev=>{const t=ev.touches[0];const ddx=t.clientX-x0,ddy=t.clientY-y0;
      if(!drag&&Math.abs(ddx)>12&&Math.abs(ddx)>Math.abs(ddy)+4)drag=true;
      if(drag){dx=Math.max(Math.min(ddx,0),-90);row.style.transform="translateX("+dx+"px)";if(ev.cancelable)ev.preventDefault();}
    },{passive:false});
    row.addEventListener("touchend",()=>{
      row.style.transition="transform .15s";row.style.transform="";
      if(drag&&dx<-55){swipedAt=Date.now();let c=null;try{c=JSON.parse(row.dataset.ctx)}catch(_){}if(c)ask2("Удалить эту переписку?",()=>deleteChatCtx(c));}
    });
    row.addEventListener("click",ev=>{ if(Date.now()-swipedAt<500){ev.stopImmediatePropagation();ev.preventDefault();} },true);
  });
}

  const ids=msgs.map(m=>m.id);
  const stick=()=>{const e=$("#cmsgs");if(e)e.scrollTop=e.scrollHeight;};

  let samePrefix=true;for(let i=0;i<n;i++){if(prev[i]!==ids[i]){samePrefix=false;break;}}
  if(samePrefix&&ids.length<prev.length){if(scroll)stick();return;}
  let isAppend=samePrefix&&prev.length>0&&ids.length>=prev.length;
  if(isAppend&&ids.length===prev.length){if(scroll)stick();return;}
  el._ids=ids;
  if(isAppend){el.insertAdjacentHTML("beforeend",msgs.slice(prev.length).map(m=>msgHTML(m,d.peer_name)).join(""));}

}

  catch(e){ toast(e.message); }
  spin(0);
}
async function saveCity(){
  const c=$("#cityIn").value;
  spin(1);
  try{
    if(c!==U.city){await api("set_city",{city:c});U.city=c}
    $("#cityLbl").textContent=scopeAll?"Вся Россия":U.city;
    closeSheet();renderFeed();
  }catch(e){ toast(e.message); }
  spin(0);
}
