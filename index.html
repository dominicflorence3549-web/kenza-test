<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<title>Кензан — вторая жизнь цветам, цены ниже рыночных</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
<style>
:root{--pine:#14352B;--pine2:#1E4A3C;--ivory:#FBF7EF;--paper:#FFF;--ink:#232C27;--muted:#8B948E;--rasp:#C84E72;--gold:#C8A24B;--line:#ECE5D8;--bg:#F6F1E8;--ok:#2E7D52;--warn:#A36B12;--sage:#EAF0EA;--blush:#F7E1E9;--blushInk:#A8385C;--sh:0 6px 22px rgba(20,53,43,.08);--shc:0 3px 14px rgba(20,53,43,.07)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#F6F1E8}
body{background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);display:flex;flex-direction:column;max-width:520px;margin:0 auto;height:100dvh;overflow:hidden;position:fixed;top:0;left:0;right:0}
button{font-family:'Inter'}
.hdr{background:var(--ivory);color:var(--pine);padding:calc(9px + var(--tg-safe-area-inset-top,0px) + var(--tg-content-safe-area-inset-top,0px)) 14px 9px;flex:none;border-bottom:1px solid var(--line)}
.hdr-top{position:relative;display:flex;align-items:center;justify-content:center;min-height:38px}
.hdr-l{position:absolute;left:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:7px}
.brand{font-family:'Prata',serif;font-size:22px;color:var(--pine)}
.brand i{font-style:normal;color:#E2A6BC}
.city{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);color:var(--pine);border-radius:99px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;max-width:42%}
.city span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:4px;text-align:center}
.chips{display:flex;gap:8px;overflow-x:auto;padding:11px 14px 3px;scrollbar-width:none;flex:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:7px 13px;border-radius:99px;background:var(--paper);border:1px solid var(--line);font-size:12.5px;font-weight:700;cursor:pointer}
.chip.on{background:var(--pine);color:var(--ivory);border-color:var(--pine)}
.scroll{flex:1;overflow-y:auto;padding:10px 14px 112px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--paper);border-radius:18px;overflow:hidden;cursor:pointer;position:relative;box-shadow:var(--shc)}
.card:active{transform:scale(.98)}
.ph{position:relative;height:0;padding-bottom:125%;background:#E7E1D2;overflow:hidden}
.ph img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
.fav{position:absolute;top:8px;right:8px;width:31px;height:31px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--rasp);z-index:3;cursor:pointer;border:none;box-shadow:0 1px 5px rgba(0,0,0,.12)}
.fmt{position:absolute;top:8px;left:8px;font-size:10px;font-weight:800;padding:4px 9px;border-radius:99px;color:#fff;z-index:2}
.fmt.auc{background:rgba(200,78,114,.93)}.fmt.fix{background:rgba(46,125,82,.93)}.fmt.char{background:rgba(200,78,114,.93)}
.sz{position:absolute;top:8px;left:8px;min-width:24px;height:24px;padding:0 6px;border-radius:8px;background:rgba(255,255,255,.93);color:var(--pine);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;z-index:2}
.szb{position:absolute;right:8px;bottom:8px;background:rgba(255,255,255,.93);color:var(--pine);font-size:11px;font-weight:800;padding:3px 8px;border-radius:8px;z-index:3;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.fav svg,.favbig svg,.hbtn svg{display:block}
.cline{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;flex-wrap:nowrap;overflow:hidden;white-space:nowrap;padding:9px 11px 11px}
.cf{color:var(--pine)}.cf.auc{color:var(--pine)}.cf.fix{color:var(--pine)}.cst{color:var(--muted);overflow:hidden;text-overflow:ellipsis}
.cdot{color:#d8d2c4}
.cch{color:var(--blushInk);display:flex;align-items:center;gap:3px}
.cbadges{position:absolute;top:8px;left:8px;display:flex;gap:5px;z-index:2}
.povr{position:absolute;left:0;right:0;bottom:0;padding:20px 10px 9px;background:linear-gradient(transparent,rgba(0,0,0,.5));z-index:2}
.pp{color:#fff;font-weight:800;font-size:16px;text-shadow:0 1px 4px rgba(0,0,0,.45)}
.pp em{font-style:normal;font-size:10.5px;font-weight:700;opacity:.85;margin-left:4px}
.pfmt{display:block;color:#fff;font-size:11px;font-weight:700;opacity:.95;text-shadow:0 1px 3px rgba(0,0,0,.5);margin-top:2px}
.ptimer{position:absolute;top:8px;right:46px;background:rgba(255,255,255,.93);border-radius:99px;padding:4px 8px;font-size:10.5px;font-weight:800;color:var(--pine);z-index:3;display:flex;align-items:center;gap:4px}
.soldov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.95);color:var(--blushInk);font-weight:800;font-size:12.5px;padding:6px 15px;border-radius:99px;box-shadow:0 2px 10px rgba(0,0,0,.18);z-index:3}
.tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.tg{font-size:12px;font-weight:600;padding:6px 11px;border-radius:9px;display:inline-flex;align-items:center;gap:4px}
.tg.cat{background:#EFEAF7;color:#6B4FA0}.tg.sz{background:#F1EFE8;color:#5F5E5A}.tg.szc{background:#F1EFE8;color:#5F5E5A}.tg.fr{background:#E7F2EA;color:#2E7D52}.tg.mt{background:#FBEAF0;color:var(--blushInk)}.tg.fmt{background:var(--sage);color:var(--pine)}.tg.g{background:var(--sage);color:var(--pine)}.tg.got{background:#F6ECD6;color:#946A14}
.ltitle{font-size:16.5px;font-weight:700;margin-top:3px;color:var(--ink)}
.sharebtn{position:absolute;top:calc(54px + var(--tg-safe-area-inset-top,0px) + var(--tg-content-safe-area-inset-top,0px));right:12px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.93);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--pine);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);z-index:5}
.tag{position:absolute;top:8px;left:8px;background:rgba(20,53,43,.88);color:var(--ivory);font-size:9.5px;font-weight:800;border-radius:6px;padding:4px 7px;z-index:2}
.tag.gold{background:rgba(146,112,33,.92)}
.taglist{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;align-items:flex-start;max-width:64%;z-index:2}
.taglist .tag{position:static;max-width:100%;line-height:1.25}
.petals{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,.93);border-radius:99px;padding:4px 8px;display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;color:var(--pine);box-shadow:0 1px 4px rgba(0,0,0,.12);z-index:2}
.pdot{display:flex;gap:2px}
.pdot s{width:6px;height:6px;border-radius:50% 50% 50% 0;background:var(--rasp);transform:rotate(-45deg);display:block}
.pdot s.off{background:#E4DCCF}
.soldbadge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-8deg);background:rgba(178,58,96,.94);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:17px;font-weight:800;letter-spacing:1px;padding:6px 20px;border-radius:8px;box-shadow:0 3px 12px rgba(0,0,0,.3);z-index:2;text-transform:uppercase}
.card.sold .ph img{filter:grayscale(.25) brightness(.9)}
.card.sold .cprice{color:var(--muted);text-decoration:line-through}
.cbody{padding:10px 12px 12px}
.cprice{font-family:'Inter',sans-serif;font-weight:700;font-size:17px;color:var(--pine)}
.cprice em{font-style:normal;font-size:11.5px;color:var(--muted);text-decoration:line-through;font-family:'Inter';font-weight:600;margin-left:6px}
.cmeta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.crow{display:flex;align-items:center;justify-content:space-between;margin-top:7px;font-size:10.5px;font-weight:800}
.bn{color:var(--rasp)}.bn.fix{color:var(--ok)}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(9px + max(env(safe-area-inset-bottom),var(--tg-safe-area-inset-bottom,0px)));width:calc(100% - 24px);max-width:472px;background:var(--ivory);border:1px solid var(--line);border-radius:24px;display:flex;padding:7px 6px;box-shadow:0 10px 28px rgba(20,53,43,.18);z-index:30}
.nv{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;color:#9AA29C;font-size:10.5px;font-weight:800;cursor:pointer;padding:5px 0}
.nv svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nv.on{color:var(--pine)}
.nv:active{transform:scale(.9)}
.nv .pk{background:var(--rasp);color:#fff;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-22px;box-shadow:0 6px 16px rgba(200,78,114,.42);border:3px solid var(--ivory)}
.nv .pk svg{width:20px;height:20px;stroke-width:2.2}
body.kb-open .nav,body.kb-open #reqFab{display:none!important}
body:not(.ready) .hdr,body:not(.ready) .chips,body:not(.ready) #view,body:not(.ready) .nav,body:not(.ready) #reqFab{visibility:hidden!important}
body.kb-open{height:100dvh}
body.kb-open .scroll{padding-bottom:calc(112px + var(--kbi,0px))}
body.kb-open.formsheet{height:100dvh}
.sheet{position:fixed;inset:0;background:rgba(15,28,23,.55);z-index:40;display:none;align-items:flex-end;justify-content:center}
.sheet.open{display:flex}
.sbody{background:var(--ivory);width:100%;max-width:520px;max-height:calc(92dvh - var(--tg-safe-area-inset-top,0px) - var(--tg-content-safe-area-inset-top,0px));border-radius:24px 24px 0 0;overflow-y:auto;animation:up .22s ease}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.sheet.formmode{height:var(--vhfull,100dvh);bottom:auto}
.sheet.formmode .sbody{max-height:calc(var(--vhfull,100dvh) - var(--kbi,0px) - 44px - var(--tg-safe-area-inset-top,0px) - var(--tg-content-safe-area-inset-top,0px));transform:translateY(calc(-1 * var(--kbi,0px)));transition:transform .26s cubic-bezier(.22,.61,.36,1);will-change:transform}
.sheetx{position:absolute;top:calc(12px + var(--tg-safe-area-inset-top,0px) + var(--tg-content-safe-area-inset-top,0px));right:14px;width:32px;height:32px;border-radius:50%;background:#ECE7DA;border:none;color:var(--pine);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:6}
.sheetx:active{transform:scale(.92)}
.gal{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;height:min(50vh,400px);background:#E7E1D2}
.gal img{width:100%;flex:none;object-fit:cover;scroll-snap-align:center}
.galwrap{position:relative}
.galdots{position:absolute;left:0;right:0;bottom:11px;display:flex;justify-content:center;gap:6px;z-index:4;pointer-events:none}
.galdots s{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.6);box-shadow:0 1px 3px rgba(0,0,0,.4);transition:width .2s,background .2s}
.galdots s.on{background:#fff;width:17px;border-radius:4px}
.xbtn{position:absolute;top:calc(8px + var(--tg-safe-area-inset-top,0px) + var(--tg-content-safe-area-inset-top,0px));left:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.93);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);z-index:5}
.sin{padding:16px 18px 28px}
.sprice{font-family:'Inter',sans-serif;font-weight:700;font-size:23px;color:var(--pine)}
.sprice em{font-style:normal;font-size:13.5px;color:var(--muted);text-decoration:line-through;font-family:'Inter';font-weight:600;margin-left:8px}
.save{display:inline-block;background:#EAF3EC;color:var(--ok);font-size:11.5px;font-weight:800;border-radius:8px;padding:4px 9px;margin-top:6px}
.kv{margin-top:14px;border-top:1px solid var(--line);padding-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;font-size:13px}
.kv b{display:block;font-size:10.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.seller{margin-top:14px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;align-items:center;gap:11px}
.ava{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#9DB89F,#1D4A3C);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex:none}
.seller .nm{font-weight:800;font-size:13.5px}
.seller .rt{font-size:11.5px;color:var(--muted);margin-top:2px}
.seller .rt i{font-style:normal;color:var(--gold);font-weight:800}
.auc{margin-top:14px;background:var(--pine);border-radius:16px;padding:14px;color:var(--ivory)}
.auc h4{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:rgba(251,247,239,.6);display:flex;justify-content:space-between;align-items:center}
.auc h4 span{font-size:13px;letter-spacing:0;text-transform:none;font-weight:800;color:#F0C8D4}
.bidlist{margin-top:10px;display:flex;flex-direction:column;gap:7px;max-height:130px;overflow-y:auto}
.bid{display:flex;justify-content:space-between;font-size:12.5px;background:rgba(255,255,255,.07);border-radius:9px;padding:7px 10px}
.bidrow{display:flex;gap:8px;margin-top:12px}
.bidrow input{flex:1;border:none;border-radius:11px;padding:12px;font-size:16px;font-weight:700;font-family:'Inter';background:rgba(255,255,255,.95);color:var(--ink);caret-color:var(--pine)}
.bidrow button{background:var(--rasp);border:none;color:#fff;font-weight:800;font-size:13.5px;border-radius:11px;padding:0 18px;cursor:pointer}
.hint{font-size:10.5px;color:rgba(251,247,239,.55);margin-top:8px;line-height:1.5}
.btn{display:block;width:100%;margin-top:14px;background:var(--rasp);border:none;color:#fff;font-weight:800;font-size:15px;border-radius:15px;padding:15px;cursor:pointer;text-align:center;box-shadow:0 8px 18px rgba(200,78,114,.26)}
.btn.green{background:var(--pine);box-shadow:0 8px 18px rgba(20,53,43,.18)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--pine);box-shadow:none}
.btn:disabled{opacity:.55}
.safety{margin-top:14px;background:#FCF6E8;border:1px solid #EFE2BE;border-radius:13px;padding:12px;font-size:11.5px;line-height:1.6;color:#6B5B2E}
.safety b{display:block;margin-bottom:3px;font-size:12px}
.rep{display:block;text-align:center;margin-top:12px;font-size:11.5px;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;width:100%}
.steps{display:flex;gap:6px;margin:4px 2px 16px}
.steps i{flex:1;height:4px;border-radius:4px;background:var(--line)}
.steps i.on{background:var(--rasp)}
.fT{font-family:'Inter',sans-serif;font-weight:700;font-size:21px;color:var(--pine);margin-bottom:4px}
.fS{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:14px}
.upload{display:block;border:2px dashed #CFC7B4;border-radius:16px;background:var(--paper);padding:22px 16px;text-align:center;cursor:pointer}
.upload p{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.5}
.thumbs{display:flex;gap:8px;margin-top:10px}
.thumbs img{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--line);display:block}
.thumb{position:relative;flex:none}
.thumbx{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:var(--rasp);color:#fff;border:2px solid var(--ivory);font-size:14px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.codebox{margin-top:14px;background:var(--pine);color:var(--ivory);border-radius:14px;padding:14px;text-align:center}
.codebox small{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:rgba(251,247,239,.55)}
.codebox b{font-family:'Courier New',monospace;font-size:23px;letter-spacing:3px;display:block;margin-top:4px}
.codebox p{font-size:11px;color:rgba(251,247,239,.7);margin-top:7px;line-height:1.5}
.lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:15px 0 7px}
.opt{display:flex;gap:8px;flex-wrap:wrap}
.opt span{padding:9px 13px;border-radius:11px;background:var(--paper);border:1.5px solid var(--line);font-size:12.5px;font-weight:700;cursor:pointer}
.opt span.on{border-color:var(--rasp);color:var(--rasp);background:#FBF0F3}
.inp{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:16px;font-family:'Inter';font-weight:600;background:var(--paper);color:var(--ink);caret-color:var(--pine)}
.inp:focus{outline:none;border-color:var(--pine)}
textarea.inp{resize:none;min-height:74px}
.fee{margin-top:12px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6}
.fee b{color:var(--ok)}
.done{text-align:center;padding:36px 10px}
.done .big{font-size:52px}
.done h3{font-family:'Inter',sans-serif;font-weight:700;font-size:22px;color:var(--pine);margin-top:14px}
.done p{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.65}
.req{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:11px}
.req h4{font-size:16.5px;font-weight:800;padding-right:88px;line-height:1.34;color:var(--ink);letter-spacing:-.1px}
.req .m{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.55}
.req .b{display:inline-block;margin-top:9px;background:#F3EDFB;color:#6B4FA0;font-size:11px;font-weight:800;border-radius:8px;padding:4px 9px}
.req .resp{float:right;background:var(--pine);color:var(--ivory);border:none;border-radius:9px;padding:8px 12px;font-size:11.5px;font-weight:800;cursor:pointer}
.banner{background:linear-gradient(120deg,var(--pine),var(--pine2));border-radius:14px;color:var(--ivory);padding:11px 14px;margin-bottom:12px}
.banner h3{font-family:'Inter',sans-serif;font-weight:700;font-size:14.5px}
.banner p{font-size:11.5px;color:rgba(251,247,239,.72);margin-top:3px;line-height:1.45}
.pcard{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center}
.pcard h3{font-family:'Inter',sans-serif;font-weight:700;font-size:19px;margin-top:8px;color:var(--pine)}
.pcard .sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5}
.rrow{display:flex;gap:8px;margin-top:10px}
.rbox{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:9px 7px;text-align:center}
.rbox b{font-family:'Inter',sans-serif;font-weight:700;font-size:17px;color:var(--pine);display:block}
.rbox small{font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:700;line-height:1.2;display:block;margin-top:2px}
.hi{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:9px;font-size:12.5px}
.hi .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hi b{font-size:13px}
.hi small{color:var(--muted);font-size:12px;display:block;margin-top:3px;line-height:1.5}
details.lotcard>summary{list-style:none;display:flex;align-items:center;gap:8px;cursor:pointer}

/* Сторож загрузки: если приложение не стартовало — показать причину, а не вечный сплэш.
   Отдельный скрипт ДО основного: ловит даже синтаксическую ошибку основного скрипта. */
(function(){
  function show(msg,sub){
    var s=document.getElementById("splash");
    if(!s)return;                       /* приложение уже загрузилось — не перекрываем */
    s.classList.remove("hide");s.dataset.err="1";
    s.innerHTML='<div style="max-width:300px;text-align:center;color:#FBF7EF;font-family:system-ui,-apple-system,sans-serif;padding:24px">'
      +'<div style="font-family:Georgia,serif;font-size:26px;margin-bottom:12px">Кенза<i style="font-style:normal;color:#E9B6C6">н</i></div>'
      +'<div style="font-size:14px;line-height:1.5">'+msg+'</div>'
      +(sub?'<div style="font-size:10px;opacity:.5;margin-top:10px;word-break:break-word">'+String(sub).slice(0,200)+'</div>':'')
      +'<button onclick="location.reload()" style="margin-top:18px;background:#C2476B;color:#fff;border:none;border-radius:11px;padding:11px 24px;font-size:14px;font-weight:700;cursor:pointer">Обновить</button></div>';
  }
  window.__bootErr=show;
  window.addEventListener("error",function(e){
    if(!document.getElementById("splash"))return;
    if(e&&(e.message||e.error))show("Не удалось запустить приложение.",(e.message||"")+(e.lineno?(" · строка "+e.lineno):""));
  });
  window.addEventListener("unhandledrejection",function(e){
    if(!document.getElementById("splash"))return;
    show("Сбой соединения при запуске.",(e&&e.reason&&e.reason.message)||"");
  });
  setTimeout(function(){
    var s=document.getElementById("splash");
    if(s&&!s._h&&!s.dataset.err)show("Загрузка идёт дольше обычного.","Проверьте интернет и нажмите «Обновить».");
  },9000);
})();
</script>

  clearTimeout(to);

let _slide=0,_slidePreview=false;
function showSlides(preview){hideSplash();_slidePreview=!!preview;_slide=0;$("#ob").classList.add("show");renderSlide();}
function closeSlides(){$("#ob").classList.remove("show");}
function renderSlide(){
  const s=SLIDES[_slide],last=_slide===SLIDES.length-1;
  const dots=SLIDES.map((_,i)=>`<s class="${i===_slide?"on":""}"></s>`).join("");
  const art=SLIDE_IMG[_slide]?`<img src="${SLIDE_IMG[_slide]}" alt="">`:s.e;
  $("#ob").innerHTML=`<div class="slides">
   <button class="skip" onclick="${_slidePreview?'closeSlides()':'showOnboarding()'}">${last?"":"Пропустить"}</button>
   <div class="sl-art">${art}</div>
   <div class="sl-h">${s.h}</div>
   <div class="sl-t">${s.t}</div>
   <div class="sl-dots">${dots}</div>
   <button class="btn" onclick="${last?(_slidePreview?'closeSlides()':'showOnboarding()'):"nextSlide()"}">${last?(_slidePreview?"Готово":"Начать"):"Далее"}</button>
   ${_slide>0?`<button class="rep" style="margin-top:8px" onclick="prevSlide()">Назад</button>`:`<div style="height:30px"></div>`}
  </div>`;
}
function nextSlide(){if(_slide<SLIDES.length-1){_slide++;renderSlide();}}
function prevSlide(){if(_slide>0){_slide--;renderSlide();}}
function showOnboarding(){
  hideSplash();
  const ob=$("#ob");ob.classList.add("show");
  ob.innerHTML=`
   <h1>Кенза<i>н</i></h1>
   <p>Свежие букеты и цветы с историей — от флористов и людей вашего города, по ценам ниже салонных. Покупайте, продавайте, оставляйте запросы. Часть лотов — в пользу благотворительности. Бесплатно.</p>
   <p style="font-size:12px;color:rgba(251,247,239,.6);line-height:1.5;margin-top:-4px">Мы запускаемся постепенно и сейчас работаем в нескольких городах. Если вашего города в списке пока нет — отметьте это, и мы откроем его при достаточном спросе.</p>
   <div class="lbl">Ваш город</div>
   <select class="inp" id="obCity" style="appearance:none;-webkit-appearance:none">
     <option value="" ${!U.city?"selected":""} disabled>Выберите город…</option>
     ${CITIES.map(c=>`<option value="${c}" ${U.city===c?"selected":""}>${c}</option>`).join("")}
   </select>
   <button class="btn ghost" style="margin-top:8px" onclick="askCity()">Моего города нет в списке</button>
   <div class="lbl">Ваше имя в чатах · обязательно</div>
   <input class="inp" id="obName" maxlength="40" placeholder="Как вас будут видеть собеседники" value="${esc(U.display_name||U.first_name||"")}">
   <div style="font-size:11.5px;color:rgba(251,247,239,.55);margin-top:4px">Логин Telegram остаётся скрытым — поделиться им можно прямо в чате.</div>
   <label class="ck"><input type="checkbox" id="ck1"><span>Принимаю <a href="${CFG.OFFER_URL}" target="_blank">Пользовательское соглашение</a> и ознакомился(ась) с <a href="${CFG.PRIVACY_URL}" target="_blank">Политикой конфиденциальности</a></span></label>
   <label class="ck"><input type="checkbox" id="ck2"><span>Даю <a href="${CFG.CONSENT_URL}" target="_blank">согласие на обработку персональных данных</a></span></label>
   <button class="btn" onclick="finishOb()">Начать</button>`;
}
async function finishOb(){
  const city=$("#obCity").value.trim();
  if(!city)return toast("Укажите город");
  const name=($("#obName").value||"").trim();
  if(name.length<2)return toast("Введите ваше имя — его увидят собеседники в чатах");
  if(!$("#ck1").checked||!$("#ck2").checked)return toast("Отметьте оба пункта согласия");
  spin(1);
  try{
    const d=await api("bootstrap",{accept_offer:true,accept_consent:true,city,display_name:name});
    U=d.user;$("#ob").classList.remove("show");start();
  }catch(e){toast(e.message)}
  spin(0);
}
function forceName(){
  const ob=$("#ob");ob.classList.add("show");
  ob.innerHTML=`<h1>Кенза<i>н</i></h1>
   <p>Как вас будут видеть собеседники в чатах? Имя обязательно — ваш логин Telegram остаётся скрытым.</p>
   <div class="lbl">Ваше имя</div>
   <input class="inp" id="fnIn" maxlength="40" placeholder="Например: Анна" value="${esc(U.display_name||U.first_name||"")}">
   <button class="btn" onclick="saveForceName()">Продолжить</button>`;

function setupLotSwipe(){

  sb.addEventListener("touchstart",function(e){

    x0=t.clientX; y0=t.clientY; act=(x0<=28); drag=false;

  },{passive:true});
  sb.addEventListener("touchmove",function(e){

  },{passive:false});
  sb.addEventListener("touchend",function(e){
    if(!act)return; act=false;
    const t=e.changedTouches&&e.changedTouches[0]; const dx=t?(t.clientX-x0):0;
    sb.style.transition="transform .2s ease,opacity .2s ease";

  },{passive:true});
}

// + localStorage kvh/kvhn): на фокус/смену поля/расфокус СРАЗУ применяем нужную высоту, поэтому лист/чат/формы
// едут в одном темпе с клавиатурой — без лага и грубого скачка, в т.ч. на переключении текст↔цифры (бюджет).
// Без кэша (самый первый раз) — один досыл после доводки через onVV. --kb не используется.
function _isInput(t){return t&&t.matches&&t.matches("input,textarea");}
function _kbType(el){if(!el)return "text";var m=((el.inputMode||(el.getAttribute&&el.getAttribute("inputmode"))||"")+"").toLowerCase();var t=((el.type||"")+"").toLowerCase();return (m==="numeric"||m==="decimal"||m==="tel"||t==="number"||t==="tel")?"num":"text";}
const _vv=window.visualViewport;
const _ds=document.documentElement.style;
function applyVH(px){if(px>0){const v=Math.round(px);_ds.setProperty("--vh",v+"px");_ds.setProperty("--kbi",Math.max(0,Math.round(_vhFull)-v)+"px");}}
let _vhFull=_vv?Math.round(_vv.height):0,_vhText=0,_vhNum=0,_curKbType="text";
try{const _a=parseInt(localStorage.getItem("kvh"));if(_a>120&&_a<1400)_vhText=_a;}catch(_){}
try{const _b=parseInt(localStorage.getItem("kvhn"));if(_b>120&&_b<1400)_vhNum=_b;}catch(_){}
// высота «клавиатура поднята» — ОТДЕЛЬНО для буквенной и цифровой раскладок (на iOS разная высота),
// чтобы на СМЕНЕ поля (текст->цифры) сразу встать на нужную высоту, а не догонять её через laggy onVV.
function _kbVal(){const cur=_curKbType==="num"?_vhNum:_vhText;if(cur&&cur<_vhFull-40)return cur;const oth=_curKbType==="num"?_vhText:_vhNum;if(oth&&oth<_vhFull-40)return oth;return _vhFull;}
function setVH(){applyVH(_vhFull);}            // сброс к полной высоте (при закрытии листа/чата)
// держим последние сообщения чата у низа ВЕСЬ переход высоты (rAF), чтобы не было снэпа/рывка
function _stickCmsgs(ms){const el=$("#cmsgs");if(!el)return;const end=Date.now()+(ms||320);const tick=()=>{const e=$("#cmsgs");if(!e)return;e.scrollTop=e.scrollHeight;if(Date.now()<end)requestAnimationFrame(tick);};requestAnimationFrame(tick);}
function onVV(){
  if(!_vv)return;
  const h=Math.round(_vv.height);
  if(h>_vhFull){_vhFull=h;_ds.setProperty("--vhfull",_vhFull+"px");}
  if(document.body.classList.contains("kb-open")){
    if(h<_vhFull-80){if(_curKbType==="num"){if(h!==_vhNum){_vhNum=h;try{localStorage.setItem("kvhn",String(h));}catch(_){}}}else if(h!==_vhText){_vhText=h;try{localStorage.setItem("kvh",String(h));}catch(_){}}}
    applyVH(_kbVal());
    if(window.scrollY||window.pageYOffset)window.scrollTo(0,0);
  }else{
    applyVH(h);
  }
}
applyVH(_vhFull);
if(_vv){_vv.addEventListener("resize",onVV);_vv.addEventListener("scroll",onVV);}
if(_vhFull>0)_ds.setProperty("--vhfull",_vhFull+"px");
document.addEventListener("focusin",e=>{
  if(!_isInput(e.target))return;
  _curKbType=_kbType(e.target);
  document.body.classList.add("kb-open");
  if(window.scrollY||window.pageYOffset)window.scrollTo(0,0);
  applyVH(_kbVal());              // встаём на нужную (по типу клавиатуры) высоту СРАЗУ — и на первом открытии, и на смене поля; onVV потом уточнит
  const t=e.target;
  // поле формы в #view (renderSell)/онбординге доводим к центру видимой зоны (с запасом над клавиатурой)
  if(t.closest&&!t.closest("#sheet")){setTimeout(()=>{if(document.activeElement===t){try{t.scrollIntoView({block:"center",behavior:"smooth"});}catch(_){}}},110);}
  _stickCmsgs(340);              // чат: держим последние сообщения у низа ВЕСЬ переход высоты (без рывка/снэпа)
});
document.addEventListener("focusout",()=>{setTimeout(()=>{if(!_isInput(document.activeElement)){document.body.classList.remove("kb-open");applyVH(_vhFull);_stickCmsgs(340);if(window.scrollY||window.pageYOffset)window.scrollTo(0,0);}},120);});
let _tapX=null,_tapY=null;
document.addEventListener("touchstart",e=>{const t=e.touches[0];if(t){_tapX=t.clientX;_tapY=t.clientY;}},{passive:true});
let _suppressClick=false;
document.addEventListener("touchend",e=>{const a=document.activeElement;if(!a||(a.tagName!=="INPUT"&&a.tagName!=="TEXTAREA"))return;if(e.target.closest&&e.target.closest("input,textarea,button,select,label,a,[onclick]"))return;const t=e.changedTouches[0];if(t&&_tapX!=null&&Math.abs(t.clientX-_tapX)<10&&Math.abs(t.clientY-_tapY)<10){a.blur();_suppressClick=true;setTimeout(()=>{_suppressClick=false;},450);}},{passive:true});
document.addEventListener("click",e=>{if(_suppressClick){_suppressClick=false;e.stopPropagation();e.preventDefault();}},true);

async function placeBid(amount){

  const inc=Math.max(10,Math.ceil((curLot.start_price||curLot.current_price)*sp/100/10)*10);const minB=curLot.current_price+inc;

function compress(file){return new Promise(res=>{const img=new Image(),r=new FileReader();
  r.onload=()=>{img.onload=()=>{
    function enc(maxDim,qual){let w=img.width,h=img.height;const k=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*k);h=Math.round(h*k);
      const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);return c.toDataURL("image/jpeg",qual);}
    const bytes=d=>Math.ceil((d.length-d.indexOf(",")-1)*3/4);
    let M=1280,q=0.8,out=enc(M,q);
    while(bytes(out)>480000&&q>0.45){q-=0.1;out=enc(M,q);}
    while(bytes(out)>480000&&M>720){M-=160;out=enc(M,0.6);}
    res(out);};
    img.onerror=()=>res(null);img.src=r.result};r.readAsDataURL(file)})}

function chatListSwipe(){

    row.addEventListener("touchmove",ev=>{const t=ev.touches[0];const ddx=t.clientX-x0,ddy=t.clientY-y0;
      if(!drag&&Math.abs(ddx)>12&&Math.abs(ddx)>Math.abs(ddy)+4)drag=true;
      if(drag){dx=Math.max(Math.min(ddx,0),-90);row.style.transform="translateX("+dx+"px)";if(ev.cancelable)ev.preventDefault();}
    },{passive:false});
    row.addEventListener("touchend",()=>{
      row.style.transition="transform .15s";row.style.transform="";
      if(drag&&dx<-55){swipedAt=Date.now();let c=null;try{c=JSON.parse(row.dataset.ctx)}catch(_){}if(c)ask2("Удалить эту переписку?",()=>deleteChatCtx(c));}
    });
    row.addEventListener("click",ev=>{ if(Date.now()-swipedAt<500){ev.stopImmediatePropagation();ev.preventDefault();} },true);
  });
}

  const stick=()=>{const e=$("#cmsgs");if(e)e.scrollTop=e.scrollHeight;};
  if(!msgs.length){
    if(!el._ids||el._ids.length!==0){el.innerHTML=`<div class="msg them" style="cursor:default">Напишите первое сообщение — собеседник получит уведомление от бота.</div>`;el._ids=[];}
    return;
  }
  const n=Math.min(prev.length,ids.length);
  let samePrefix=true;for(let i=0;i<n;i++){if(prev[i]!==ids[i]){samePrefix=false;break;}}
  if(samePrefix&&ids.length<prev.length){if(scroll)stick();return;}
  let isAppend=samePrefix&&prev.length>0&&ids.length>=prev.length;
  if(isAppend&&ids.length===prev.length){if(scroll)stick();return;}
  el._ids=ids;
  if(isAppend){el.insertAdjacentHTML("beforeend",msgs.slice(prev.length).map(m=>msgHTML(m,d.peer_name)).join(""));}
  else{el.innerHTML=msgs.map(m=>msgHTML(m,d.peer_name)).join("");}
  if(scroll||atBottom){stick();requestAnimationFrame(stick);if(!isAppend)setTimeout(stick,120);el.querySelectorAll(".msgimg").forEach(im=>{if(im._b)return;im._b=1;im.addEventListener("load",()=>{const e=$("#cmsgs");if(e&&e.scrollHeight-e.scrollTop-e.clientHeight<200)e.scrollTop=e.scrollHeight;},{once:true});});}
}

  const box=document.createElement("div");
  box.style.cssText="background:var(--ivory);border-radius:18px;padding:20px;max-width:320px;width:100%;box-shadow:0 14px 44px rgba(0,0,0,.32)";
  box.innerHTML=`<div style="font-size:14.5px;font-weight:800;color:var(--pine);margin-bottom:4px">Фиксированная цена</div><div style="font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:12px">Лот станет фикс-ценой и вернётся в ленту на 5 дней.</div><input class="inp" id="_fxp" type="number" inputmode="numeric" value="${cur||""}" placeholder="Цена, ₽"><div style="display:flex;gap:10px;margin-top:14px"><button class="_n" style="flex:1;background:#ECE7DA;border:none;border-radius:11px;padding:12px;font-weight:700;font-family:Inter;cursor:pointer">Отмена</button><button class="_y" style="flex:1;background:var(--rasp);color:#fff;border:none;border-radius:11px;padding:12px;font-weight:800;font-family:Inter;cursor:pointer">Опубликовать</button></div>`;
  d.appendChild(box);d.onclick=e=>{if(e.target===d)d.remove();};
  box.querySelector("._n").onclick=()=>d.remove();
  box.querySelector("._y").onclick=async()=>{const v=Math.round(Number(box.querySelector("#_fxp").value));if(!v||v<100||v>200000){toast("Цена: от 100 до 200 000 ₽");return;}d.remove();spin(1);try{await api("set_fixed",{lot_id:id,price:v});toast("Лот выставлен по фикс-цене");renderProf();}catch(e){toast(e.message)}spin(0);};
  document.body.appendChild(d);
  setTimeout(()=>{const i=box.querySelector("#_fxp");if(i)i.focus();},120);
}
function rateModal(lotId,whoText){
  let stars=0;
  const d=document.createElement("div");
  d.style.cssText="position:fixed;left:0;right:0;top:0;height:var(--vh,100dvh);background:rgba(15,28,23,.55);z-index:130;display:flex;align-items:center;justify-content:center;padding:24px;transition:height .2s cubic-bezier(.32,.72,0,1)";
  const box=document.createElement("div");
  box.style.cssText="background:var(--ivory);border-radius:18px;padding:22px;max-width:320px;width:100%;text-align:center;box-shadow:0 14px 44px rgba(0,0,0,.32)";
  box.innerHTML=`<div style="font-family:'Inter',sans-serif;font-weight:700;font-size:18px;color:var(--pine)">Оцените ${esc(whoText)}</div><div style="font-size:12px;color:var(--muted);margin:4px 0 12px">Это формирует рейтинг — главную валюту площадки</div><div class="_rs" style="font-size:30px;letter-spacing:6px;margin-bottom:12px"></div><input class="inp _rc" maxlength="200" placeholder="Пара слов (необязательно)" style="margin-bottom:12px"><div style="display:flex;gap:10px"><button class="_later" style="flex:1;background:#ECE7DA;border:none;border-radius:11px;padding:11px;font-weight:700;font-family:'Inter';cursor:pointer">Позже</button><button class="_send" style="flex:1;background:var(--pine);color:#fff;border:none;border-radius:11px;padding:11px;font-weight:800;font-family:'Inter';cursor:pointer">Отправить</button></div>`;
  d.appendChild(box);document.body.appendChild(d);
  const rs=box.querySelector("._rs");
  for(let i=1;i<=5;i++){const s=document.createElement("span");s.textContent="★";s.style.cssText="cursor:pointer;color:#D9CFC0";s.onclick=()=>{stars=i;[...rs.children].forEach((c,idx)=>c.style.color=idx<i?"var(--gold)":"#D9CFC0");};rs.appendChild(s);}
  box.querySelector("._later").onclick=()=>d.remove();
  box.querySelector("._send").onclick=async()=>{
    if(!stars)return toast("Выберите оценку звёздами");
    const c=(box.querySelector("._rc").value||"").trim();
    d.remove();spin(1);
    try{await api("rate",{lot_id:lotId,stars,comment:c});toast("Спасибо! Оценка учтена");renderProf();}catch(e){toast(e.message)}
    spin(0);
  };
}
function markSold(id){
  ask2("Подтвердить продажу этого букета? Если покупатель писал вам — он подтвердит получение, и вы оцените друг друга.",async()=>{
    spin(1);try{const d=await api("mark_sold",{lot_id:id});toast(d&&d.pending?"Отметили продажу. Покупатель подтвердит получение — потом оцените.":"Готово, продано!");renderProf();}catch(e){toast(e.message)}spin(0);
  });
}
function confirmReceived(id){
  ask2("Подтвердить, что вы получили букет? Сделка будет завершена, после этого можно оценить продавца.",async()=>{
    spin(1);
    try{const d=await api("confirm_received",{lot_id:id});if(d&&d.done){toast("🎉 Сделка проведена!");renderProf();setTimeout(()=>rateModal(id,"продавца"),250);}else renderProf();}
    catch(e){toast(e.message)}
    spin(0);
  });
}
function cancelLot(id){
  ask2("Снять лот с публикации?",async()=>{
    spin(1);try{await api("cancel_lot",{lot_id:id});toast("Лот снят");renderProf()}catch(e){toast(e.message)}spin(0);
  });
}
async function extendLot(id){
  spin(1);try{await api("extend_lot",{lot_id:id});toast("Лот снова в ленте");renderProf()}catch(e){toast(e.message)}spin(0);
}
async function uploadCharity(id,files){
  if(!files||!files[0])return;
  spin(1);
  try{const d=await compress(files[0]);if(!d)throw new Error("Не удалось обработать фото");
    await api("charity_proof",{lot_id:id,photos:[d]});toast("Чек приложен — покупатель уведомлён");renderProf();
  }catch(e){toast(e.message)}
  spin(0);
}
function rate(lotId,stars,el){
  const row=el.parentNode;[...row.children].forEach((b,i)=>b.classList.toggle("on",i<stars));
  row.dataset.sel=stars;
  if(!document.getElementById("rc_"+lotId)){
    row.insertAdjacentHTML("afterend",`<div style="display:flex;gap:8px;margin-top:8px"><input class="inp" id="rc_${lotId}" maxlength="200" placeholder="Пара слов (необязательно)" style="padding:10px"><button onclick="submitRate('${lotId}')" style="background:var(--pine);color:#fff;border:none;border-radius:10px;padding:0 16px;font-weight:800;cursor:pointer">→</button></div>`);
  }
}
async function submitRate(lotId){
  const row=document.querySelector('.starrow[data-lot="'+lotId+'"]');
  const stars=Number((row&&row.dataset.sel)||0);if(!stars)return toast("Выберите оценку звёздами");
  const inp=document.getElementById("rc_"+lotId);const c=((inp&&inp.value)||"").trim();
  spin(1);
  try{await api("rate",{lot_id:lotId,stars,comment:c});toast("Спасибо! Оценка учтена");renderProf()}catch(e){toast(e.message)}
  spin(0);
}

function addHome(){
  try{ if(tgApp && tgApp.addToHomeScreen){ tgApp.addToHomeScreen(); return; } }catch(e){}
  toast("Доступно в свежих версиях Telegram — обновите приложение");
}
function copyRef(){const link="https://t.me/kenza_test_bot?startapp=src_"+((U&&U.username)||"ref");try{navigator.clipboard.writeText(link);toast("Ссылка скопирована — делитесь!");}catch(e){toast(link);}}
function shareApp(){
  const link="https://t.me/"+CFG.BOT;
  const txt="Кензан — вторая жизнь цветам 🌷 Свежие букеты и букеты с историей от людей и магазинов твоего города. Купить, продать или поймать на аукционе — анонимно и бесплатно. Загляни:";
  const url="https://t.me/share/url?url="+encodeURIComponent(link)+"&text="+encodeURIComponent(txt);
  try{ if(tgApp && tgApp.openTelegramLink){ tgApp.openTelegramLink(url); return; } }catch(e){}
  window.open(url,"_blank");
}
let myDisp="";
function editName(){
  const h=document.getElementById("pname"); if(!h)return;
  h.outerHTML=`<div style="display:flex;gap:8px;justify-content:center;align-items:center;margin:4px 0 2px"><input class="inp" id="nmIn" maxlength="40" value="${esc(myDisp)}" placeholder="Ваше имя в чатах" style="max-width:210px;padding:9px"><button onclick="saveName()" style="background:var(--pine);color:#fff;border:none;border-radius:10px;padding:0 14px;font-weight:800;cursor:pointer">OK</button></div>`;
  const i=document.getElementById("nmIn"); if(i)i.focus();
}
async function saveName(){
  const v=((document.getElementById("nmIn")||{}).value||"").trim();
  spin(1);
  try{ await api("set_name",{name:v}); toast("Имя обновлено"); renderProf(); }catch(e){ toast(e.message); }
  spin(0);
}
function pickAvatar(){const f=$("#avFile");if(f)f.click();}
async function uploadAvatar(files){
  if(!files||!files[0])return;
  spin(1);
  try{
    const d=await compress(files[0]);
    if(!d)throw new Error("Не удалось обработать фото — попробуйте другое");
    const r=await api("set_avatar",{photos:[d]});
    if(U)U.avatar=r.avatar;
    toast("Фото профиля обновлено");
    renderProf();
  }catch(e){toast(e.message)}
  spin(0);
}
/* ================== город ================== */
function openCity(){
  $("#sbody").innerHTML=`<div class="sin" style="padding-top:50px">
   <div class="fT">Город и охват</div>
   <div class="fS">Кензан запускается постепенно — пока работаем в нескольких городах. Укажите свой город и решите, что показывать в ленте.</div>
   <div class="lbl">Мой город</div>
   <select class="inp" id="cityIn" style="appearance:none;-webkit-appearance:none">${CITIES.map(c=>`<option value="${c}" ${U.city===c?"selected":""}>${c}</option>`).join("")}</select>
   <button class="btn ghost" style="margin-top:8px" onclick="askCity()">Моего города нет в списке</button>
   <div class="lbl">Показывать в ленте</div>
   <div class="opt"><span class="${!scopeAll?"on":""}" onclick="scopeAll=false;openCity()">Только мой город</span><span class="${scopeAll?"on":""}" onclick="scopeAll=true;openCity()">Вся Россия</span></div>
   <button class="btn" onclick="saveCity()">Сохранить</button></div>`;
  $("#sheet").classList.add("open");syncBack();
}
function askCity(){
  const cur=tab;
  $("#sbody").innerHTML=`<button class="sheetx" onclick="closeSheet()" aria-label="Закрыть">✕</button><div class="sin">
   <div class="fT">Какого города не хватает?</div>
   <div class="fS">Мы открываем новые города по мере спроса. Напишите свой — и как только наберётся достаточно желающих, мы откроем его. Можно также написать нам в поддержку (просто сообщение боту).</div>
   <div class="lbl">Ваш город</div><input class="inp" id="askCityIn" maxlength="60" placeholder="Например: Казань">
   <button class="btn" onclick="sendCityReq()">Отправить</button></div>`;
  const sb=$("#sbody");sb.classList.remove("lotfull");sb.classList.remove("formfull");
  document.body.classList.add("formsheet");$("#sheet").classList.add("open","formmode");syncBack();
}
async function sendCityReq(){
  const c=($("#askCityIn").value||"").trim();
  if(!c)return toast("Укажите город");
  spin(1);
  try{ await api("city_request",{city_text:c}); closeSheet(); toast("Спасибо! Передали — откроем город при достаточном спросе."); }
  catch(e){ toast(e.message); }
  spin(0);
}
async function saveCity(){
  const c=$("#cityIn").value;
  spin(1);
  try{
    if(c!==U.city){await api("set_city",{city:c});U.city=c}
    $("#cityLbl").textContent=scopeAll?"Вся Россия":U.city;
    closeSheet();renderFeed();
  }catch(e){ toast(e.message); }
  spin(0);
}
try{var _navEl=document.querySelector(".nav");if(_navEl)_navEl.addEventListener("click",function(ev){if(ev.target.closest&&ev.target.closest(".nv")){try{if(tgApp&&tgApp.HapticFeedback)tgApp.HapticFeedback.impactOccurred("light");}catch(_){}}});}catch(_){}
boot();
</script>
